<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnostic Données - Ma Petite Bib</title>
  <link rel="stylesheet" href="style-global.css">
  <script src="sync-data.js"></script>
  
  <style>
    body {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    h1 { color: var(--primary); }
    h2 { color: var(--text-primary); margin-top: 30px; }
    
    pre {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      max-height: 400px;
      overflow-y: auto;
    }
    
    .btn {
      padding: 12px 24px;
      background: var(--brown-gradient);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      margin: 5px;
    }
    
    .btn-danger {
      background: #e74c3c;
    }
    
    .warning {
      background: #fff3cd;
      border: 2px solid #ffc107;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🔍 Diagnostic des données élèves</h1>
    <p>Cette page vous montre exactement ce qui est stocké dans votre navigateur.</p>
    
    <div style="margin-top: 20px;">
      <button class="btn" onclick="afficherDonnees()">📊 Voir les données</button>
      <button class="btn btn-danger" onclick="nettoyerDonnees()">🗑️ Nettoyer toutes les données</button>
      <button class="btn" onclick="window.location.href='index.html'">🏠 Retour</button>
    </div>
  </div>

  <div class="card" id="resultats" style="display: none;">
    
    <h2>📋 Liste des élèves</h2>
    <div id="listeEleves"></div>
    
    <h2>🔧 Données brutes (localStorage)</h2>
    <pre id="donneesRaw"></pre>
    
    <h2>💾 Toutes les clés localStorage</h2>
    <pre id="toutesLesCles"></pre>
    
  </div>

  <script>
    function afficherDonnees() {
      document.getElementById('resultats').style.display = 'block';
      
      // Récupérer les élèves via SyncData
      const eleves = window.SyncData.getEleves();
      
      // Afficher la liste formatée
      let html = '';
      if (eleves && eleves.length > 0) {
        html += `<p><strong>Nombre d'élèves :</strong> ${eleves.length}</p>`;
        html += '<table style="width: 100%; border-collapse: collapse; margin-top: 10px;">';
        html += '<thead><tr style="background: #f5f5f5;">';
        html += '<th style="padding: 10px; border: 1px solid #ddd;">ID</th>';
        html += '<th style="padding: 10px; border: 1px solid #ddd;">Nom</th>';
        html += '<th style="padding: 10px; border: 1px solid #ddd;">Prénom</th>';
        html += '<th style="padding: 10px; border: 1px solid #ddd;">Structure</th>';
        html += '</tr></thead><tbody>';
        
        eleves.forEach(eleve => {
          const nom = eleve.nom || '<span style="color: red;">undefined</span>';
          const prenom = eleve.prenom || '<span style="color: red;">undefined</span>';
          const structure = JSON.stringify(eleve, null, 2);
          
          html += '<tr>';
          html += `<td style="padding: 10px; border: 1px solid #ddd;">${eleve.id}</td>`;
          html += `<td style="padding: 10px; border: 1px solid #ddd;">${nom}</td>`;
          html += `<td style="padding: 10px; border: 1px solid #ddd;">${prenom}</td>`;
          html += `<td style="padding: 10px; border: 1px solid #ddd;"><pre style="margin: 0; font-size: 0.8em;">${structure}</pre></td>`;
          html += '</tr>';
        });
        
        html += '</tbody></table>';
      } else {
        html = '<p style="color: red;">Aucun élève trouvé !</p>';
      }
      
      document.getElementById('listeEleves').innerHTML = html;
      
      // Données brutes localStorage
      const elevesRaw = localStorage.getItem('eleves_data');
      document.getElementById('donneesRaw').textContent = elevesRaw || 'Vide';
      
      // Toutes les clés
      const allKeys = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        allKeys[key] = localStorage.getItem(key);
      }
      document.getElementById('toutesLesCles').textContent = JSON.stringify(allKeys, null, 2);
    }
    
    function nettoyerDonnees() {
      if (!confirm('⚠️ ATTENTION !\n\nCela va SUPPRIMER TOUTES vos données (élèves, évaluations, etc.).\n\nÊtes-vous sûr(e) ?')) {
        return;
      }
      
      if (!confirm('Vraiment vraiment sûr(e) ?\n\nCette action est IRRÉVERSIBLE !')) {
        return;
      }
      
      // Nettoyer tout
      localStorage.clear();
      
      alert('✅ Toutes les données ont été supprimées.\n\nVous pouvez maintenant ré-importer votre fichier Excel proprement.');
      
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
