<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiche de Préparation</title>
<style>
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #8b6f47 0%, #6b5435 100%);
  color: white;
}

.loading {
  text-align: center;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 5px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

h2 { font-size: 1.5rem; margin-bottom: 10px; }
p { opacity: 0.9; }
</style>
</head>
<body>

<div class="loading">
  <div class="spinner"></div>
  <h2>Chargement de la fiche de préparation...</h2>
  <p id="niveau-text">Redirection en cours</p>
</div>

<script>
// Récupérer le niveau choisi
const niveau = localStorage.getItem('niveau_classe');

// Redirection selon le niveau
const fichePrepFiles = {
  'PS': 'fiche-preparation-ps.html',
  'MS': 'fiche-preparation-ms.html',
  'GS': 'fiche-preparation-gs.html'
};

if (niveau && fichePrepFiles[niveau]) {
  document.getElementById('niveau-text').textContent = `Niveau détecté : ${niveau}`;
  
  setTimeout(() => {
    window.location.href = fichePrepFiles[niveau];
  }, 500);
} else {
  // Par défaut, rediriger vers GS
  document.getElementById('niveau-text').textContent = 'Aucun niveau sélectionné - Redirection vers GS';
  
  setTimeout(() => {
    window.location.href = 'fiche-preparation-gs.html';
  }, 500);
}
</script>

</body>
</html>
