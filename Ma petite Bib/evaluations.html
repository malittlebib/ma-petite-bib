<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Évaluations - Ma Petite Bib</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ══════════════════════════════════════════════════
       SYSTÈME DE THÈMES - Rose Planner vs Beige Classic
       ══════════════════════════════════════════════════ */
    
    /* Thème par défaut : Rose Planner */
    :root {
      --primary: #b57c84;
      --primary-dark: #745252;
      --primary-light: #c9909a;
      --success: #27ae60;
      --warning: #f39c12;
      --danger: #e74c3c;
      --info: #3498db;
      --light: #fdf0f1;
      --dark: #3a2a2a;
      --cream: #fffaf6;
      --rose-pale: #f5dde0;
      --text-mid: #6b4848;
      --white: #ffffff;
    }

    /* Thème alternatif : Beige Classic */
    [data-theme="beige"] {
      --primary: #8b6f47;
      --primary-dark: #6b5435;
      --primary-light: #a68a5e;
      --success: #27ae60;
      --warning: #f39c12;
      --danger: #e74c3c;
      --info: #3498db;
      --light: #f5f1eb;
      --dark: #2d2520;
      --cream: #faf8f5;
      --rose-pale: #e8dfd3;
      --text-mid: #6b5d52;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 2rem;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #95a5a6;
      color: white;
    }

    .btn-success {
      background: #27ae60;
      color: white;
    }

    .content {
      padding: 30px;
    }

    .selection-panel {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-weight: 600;
      color: #2c3e50;
      font-size: 0.95rem;
    }

    .field select {
      padding: 12px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .field select:focus {
      outline: none;
      border-color: #667eea;
    }

    .stats-bar {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 20px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #667eea;
    }

    .stat-label {
      font-size: 0.9rem;
      color: #7f8c8d;
      margin-top: 5px;
    }

    .domaines-grid {
      display: grid;
      gap: 20px;
    }

    .domaine-card {
      background: white;
      border: 2px solid #e9ecef;
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s;
    }

    .domaine-card:hover {
      border-color: #667eea;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.1);
    }

    .domaine-header {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .domaine-header h3 {
      color: #2c3e50;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .domaine-progress {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      color: #7f8c8d;
    }

    .progress-bar {
      width: 100px;
      height: 8px;
      background: #e9ecef;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      transition: width 0.3s;
    }

    .competences-list {
      padding: 20px;
      display: none;
    }

    .competences-list.open {
      display: block;
    }

    .competence-item {
      padding: 15px;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .competence-item:last-child {
      border-bottom: none;
    }

    .competence-text {
      flex: 1;
    }

    .competence-title {
      font-weight: 500;
      color: #2c3e50;
      margin-bottom: 5px;
    }

    .competence-explication {
      font-size: 0.85rem;
      color: #7f8c8d;
      white-space: pre-line;
      margin-top: 8px;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 6px;
      display: none;
    }

    .competence-explication.show {
      display: block;
    }

    .evaluation-buttons {
      display: flex;
      gap: 8px;
    }

    .eval-btn {
      width: 40px;
      height: 40px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .eval-btn:hover {
      transform: scale(1.1);
    }

    .eval-btn.active {
      border-width: 3px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .eval-btn.non-acquis {
      border-color: #e74c3c;
      background: #e74c3c;
      color: white;
    }

    .eval-btn.en-cours {
      border-color: #f39c12;
      background: #f39c12;
      color: white;
    }

    .eval-btn.acquis {
      border-color: #27ae60;
      background: #27ae60;
      color: white;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #95a5a6;
    }

    .empty-state i {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .btn-export {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
      transition: all 0.3s;
    }

    .btn-export:hover {
      transform: scale(1.1);
    }

    .info-button {
      background: none;
      border: none;
      color: #667eea;
      cursor: pointer;
      font-size: 1rem;
      margin-left: 8px;
      transition: transform 0.3s;
    }

    .info-button:hover {
      transform: scale(1.2);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>
      <i class="fas fa-clipboard-check"></i>
      Évaluations des Compétences
    </h1>
    <div style="display: flex; gap: 10px;">
      <button class="btn btn-success" onclick="exporterBulletin()" style="background: #27ae60;">
        <i class="fas fa-file-pdf"></i> Bulletin
      </button>
      <button class="btn btn-secondary" onclick="window.location.href='index-planner.html'">
        <i class="fas fa-home"></i> Retour
      </button>
    </div>
  </div>

  <div class="content">
    <!-- Panneau de sélection -->
    <div class="selection-panel">
      <div class="field">
        <label><i class="fas fa-child"></i> Élève</label>
        <select id="selectEleve" onchange="chargerEvaluations()">
          <option value="">-- Sélectionnez un élève --</option>
        </select>
      </div>

      <div class="field">
        <label><i class="fas fa-layer-group"></i> Niveau</label>
        <select id="selectNiveau" onchange="chargerDomaines()">
          <option value="">-- Sélectionnez --</option>
          <option value="PS">Petite Section</option>
          <option value="MS">Moyenne Section</option>
          <option value="GS">Grande Section</option>
        </select>
      </div>
    </div>

    <!-- Statistiques -->
    <div class="stats-bar" id="statsBar" style="display: none;">
      <div class="stat">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">Compétences totales</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statAcquis" style="color: #27ae60;">0</div>
        <div class="stat-label">✅ Acquis</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statEnCours" style="color: #f39c12;">0</div>
        <div class="stat-label">🔶 En cours</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statNonAcquis" style="color: #e74c3c;">0</div>
        <div class="stat-label">⭕ Non acquis</div>
      </div>
    </div>

    <!-- Liste des domaines et compétences -->
    <div id="domainesContainer"></div>

    <!-- État vide -->
    <div class="empty-state" id="emptyState">
      <i class="fas fa-clipboard-list"></i>
      <h3>Aucune évaluation</h3>
      <p>Sélectionnez un élève et un niveau pour commencer</p>
    </div>
  </div>
</div>

<script src="competences-officielles-data.js"></script>
<script>
// Charger le thème sauvegardé
function chargerTheme() {
  const savedTheme = localStorage.getItem('app_theme') || 'rose';
  if (savedTheme === 'beige') {
    document.documentElement.setAttribute('data-theme', 'beige');
  }
}
chargerTheme();

// ═══════════════════════════════════════════
// CODE ORIGINAL
// ═══════════════════════════════════════════

let eleveActuel = null;
let niveauActuel = null;
let evaluations = {}; // Format: { eleveId: { competenceUuid: 'acquis'|'en-cours'|'non-acquis' } }

// Charger les élèves
function chargerEleves() {
  const select = document.getElementById('selectEleve');
  const eleves = JSON.parse(localStorage.getItem('eleves') || '[]');
  
  eleves.forEach(eleve => {
    const option = document.createElement('option');
    option.value = eleve.id;
    option.textContent = `${eleve.prenom} ${eleve.nom}`;
    select.appendChild(option);
  });
}

// Charger les évaluations depuis localStorage
function chargerEvaluations() {
  eleveActuel = document.getElementById('selectEleve').value;
  
  if (!eleveActuel) {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('domainesContainer').innerHTML = '';
    document.getElementById('statsBar').style.display = 'none';
    return;
  }
  
  evaluations = JSON.parse(localStorage.getItem('evaluations_competences') || '{}');
  
  if (niveauActuel) {
    afficherDomaines();
  }
}

// Charger les domaines selon le niveau
function chargerDomaines() {
  niveauActuel = document.getElementById('selectNiveau').value;
  
  if (!niveauActuel || !eleveActuel) {
    return;
  }
  
  afficherDomaines();
}

// Afficher les domaines et compétences
function afficherDomaines() {
  const container = document.getElementById('domainesContainer');
  const emptyState = document.getElementById('emptyState');
  
  if (!niveauActuel || !eleveActuel) {
    emptyState.style.display = 'block';
    container.innerHTML = '';
    return;
  }
  
  emptyState.style.display = 'none';
  container.innerHTML = '';
  
  const data = competencesOfficielles.competences_maternelle_par_niveau[niveauActuel];
  
  data.domaines.forEach((domaine, domaineIndex) => {
    const card = document.createElement('div');
    card.className = 'domaine-card';
    
    // Calculer la progression
    const nbTotal = domaine.competences.length;
    const nbAcquis = domaine.competences.filter(c => 
      evaluations[eleveActuel]?.[c.uuid] === 'acquis'
    ).length;
    const progression = Math.round((nbAcquis / nbTotal) * 100);
    
    card.innerHTML = `
      <div class="domaine-header" onclick="toggleDomaine(${domaineIndex})">
        <h3>
          <i class="fas fa-book"></i>
          ${domaine.domaine}
        </h3>
        <div class="domaine-progress">
          <span>${nbAcquis}/${nbTotal}</span>
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${progression}%"></div>
          </div>
          <i class="fas fa-chevron-down" id="chevron-${domaineIndex}"></i>
        </div>
      </div>
      <div class="competences-list" id="competences-${domaineIndex}">
        ${domaine.competences.map((comp, compIndex) => `
          <div class="competence-item">
            <div class="competence-text">
              <div class="competence-title">
                ${comp.competence}
                ${comp.explication ? '<button class="info-button" onclick="toggleExplication(event, ' + domaineIndex + ', ' + compIndex + ')"><i class="fas fa-info-circle"></i></button>' : ''}
              </div>
              ${comp.explication ? '<div class="competence-explication" id="expl-' + domaineIndex + '-' + compIndex + '">' + comp.explication + '</div>' : ''}
            </div>
            <div class="evaluation-buttons">
              <button class="eval-btn ${getEvalClass(comp.uuid, 'non-acquis')}" 
                      onclick="evaluer('${comp.uuid}', 'non-acquis')" 
                      title="Non acquis">
                ⭕
              </button>
              <button class="eval-btn ${getEvalClass(comp.uuid, 'en-cours')}" 
                      onclick="evaluer('${comp.uuid}', 'en-cours')" 
                      title="En cours d'acquisition">
                🔶
              </button>
              <button class="eval-btn ${getEvalClass(comp.uuid, 'acquis')}" 
                      onclick="evaluer('${comp.uuid}', 'acquis')" 
                      title="Acquis">
                ✅
              </button>
            </div>
          </div>
        `).join('')}
      </div>
    `;
    
    container.appendChild(card);
  });
  
  updateStats();
  document.getElementById('statsBar').style.display = 'flex';
}

function toggleDomaine(index) {
  const list = document.getElementById(`competences-${index}`);
  const chevron = document.getElementById(`chevron-${index}`);
  
  list.classList.toggle('open');
  chevron.style.transform = list.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0)';
}

function toggleExplication(event, domaineIndex, compIndex) {
  event.stopPropagation();
  const expl = document.getElementById(`expl-${domaineIndex}-${compIndex}`);
  expl.classList.toggle('show');
}

function getEvalClass(uuid, niveau) {
  const eval = evaluations[eleveActuel]?.[uuid];
  return eval === niveau ? `active ${niveau}` : '';
}

function evaluer(uuid, niveau) {
  if (!evaluations[eleveActuel]) {
    evaluations[eleveActuel] = {};
  }
  
  // Toggle: si déjà sélectionné, on désélectionne
  if (evaluations[eleveActuel][uuid] === niveau) {
    delete evaluations[eleveActuel][uuid];
  } else {
    evaluations[eleveActuel][uuid] = niveau;
  }
  
  // Sauvegarder
  localStorage.setItem('evaluations_competences', JSON.stringify(evaluations));
  
  // Mettre à jour seulement les boutons et les stats (SANS rafraîchir tout)
  updateEvaluationButtons(uuid);
  updateStats();
  updateDomainesProgress();
}

function updateEvaluationButtons(uuid) {
  // Trouver tous les boutons pour cette compétence
  const allButtons = document.querySelectorAll(`[onclick*="${uuid}"]`);
  
  allButtons.forEach(btn => {
    // Retirer toutes les classes actives
    btn.classList.remove('active', 'non-acquis', 'en-cours', 'acquis');
    
    // Ajouter la classe active si c'est le bon niveau
    const niveau = btn.getAttribute('onclick').match(/'([^']+)'\)$/)[1];
    if (evaluations[eleveActuel]?.[uuid] === niveau) {
      btn.classList.add('active', niveau);
    }
  });
}

function updateDomainesProgress() {
  const data = competencesOfficielles.competences_maternelle_par_niveau[niveauActuel];
  
  data.domaines.forEach((domaine, domaineIndex) => {
    const nbTotal = domaine.competences.length;
    const nbAcquis = domaine.competences.filter(c => 
      evaluations[eleveActuel]?.[c.uuid] === 'acquis'
    ).length;
    const progression = Math.round((nbAcquis / nbTotal) * 100);
    
    // Mettre à jour le texte et la barre
    const progressText = document.querySelector(`#competences-${domaineIndex}`).parentElement.querySelector('.domaine-progress span');
    const progressBar = document.querySelector(`#competences-${domaineIndex}`).parentElement.querySelector('.progress-fill');
    
    if (progressText) progressText.textContent = `${nbAcquis}/${nbTotal}`;
    if (progressBar) progressBar.style.width = `${progression}%`;
  });
}

function updateStats() {
  if (!niveauActuel || !eleveActuel) return;
  
  const data = competencesOfficielles.competences_maternelle_par_niveau[niveauActuel];
  const allCompetences = data.domaines.flatMap(d => d.competences);
  
  const total = allCompetences.length;
  const acquis = allCompetences.filter(c => evaluations[eleveActuel]?.[c.uuid] === 'acquis').length;
  const enCours = allCompetences.filter(c => evaluations[eleveActuel]?.[c.uuid] === 'en-cours').length;
  const nonAcquis = allCompetences.filter(c => evaluations[eleveActuel]?.[c.uuid] === 'non-acquis').length;
  
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statAcquis').textContent = acquis;
  document.getElementById('statEnCours').textContent = enCours;
  document.getElementById('statNonAcquis').textContent = nonAcquis;
}

function exporterBulletin() {
  if (!eleveActuel || !niveauActuel) {
    alert('⚠️ Veuillez sélectionner un élève et un niveau');
    return;
  }
  
  // Récupérer les infos élève - essayer plusieurs formats
  const eleves = JSON.parse(localStorage.getItem('eleves') || '[]');
  let eleve = eleves.find(e => e.id === eleveActuel);
  
  // Si pas trouvé par ID, essayer par index
  if (!eleve) {
    eleve = eleves.find(e => e.id === parseInt(eleveActuel));
  }
  
  // Si toujours pas trouvé, essayer de récupérer par le select
  if (!eleve) {
    const selectEleve = document.getElementById('selectEleve');
    const selectedOption = selectEleve.options[selectEleve.selectedIndex];
    const nom = selectedOption.textContent.split(' ').pop();
    const prenom = selectedOption.textContent.split(' ').slice(0, -1).join(' ');
    
    eleve = {
      nom: nom || 'Nom',
      prenom: prenom || 'Prénom',
      id: eleveActuel
    };
  }
  
  console.log('Élève sélectionné:', eleve);
  console.log('ID recherché:', eleveActuel);
  console.log('Élèves disponibles:', eleves);
  
  // Récupérer les données
  const data = competencesOfficielles.competences_maternelle_par_niveau[niveauActuel];
  const allCompetences = data.domaines.flatMap(d => d.competences);
  
  // Calculer les stats
  const total = allCompetences.length;
  const acquis = allCompetences.filter(c => evaluations[eleveActuel]?.[c.uuid] === 'acquis').length;
  const enCours = allCompetences.filter(c => evaluations[eleveActuel]?.[c.uuid] === 'en-cours').length;
  const nonAcquis = allCompetences.filter(c => evaluations[eleveActuel]?.[c.uuid] === 'non-acquis').length;
  const nonEvalues = total - acquis - enCours - nonAcquis;
  
  const pctAcquis = Math.round((acquis / total) * 100);
  const pctEnCours = Math.round((enCours / total) * 100);
  const pctNonAcquis = Math.round((nonAcquis / total) * 100);
  
  // Générer le HTML du bulletin
  const css = `
    @page { margin: 1.5cm; }
    body { 
      font-family: Arial, sans-serif; 
      color: #2c3e50; 
      line-height: 1.4; 
      font-size: 10pt; 
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 15px;
      margin-bottom: 20px;
      border-bottom: 3px solid #667eea;
    }
    .header img { height: 40px; }
    .header h1 {
      margin: 0;
      font-size: 1.5rem;
      color: #667eea;
    }
    .info-eleve {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .info-eleve strong { color: #667eea; }
    .stats-global {
      display: flex;
      justify-content: space-around;
      margin: 20px 0;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    .stat-item {
      text-align: center;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .stat-acquis { color: #27ae60; }
    .stat-encours { color: #f39c12; }
    .stat-nonacquis { color: #e74c3c; }
    .stat-label {
      font-size: 0.85rem;
      color: #7f8c8d;
    }
    .domaine-section {
      margin: 20px 0;
      page-break-inside: avoid;
    }
    .domaine-title {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 10px 15px;
      border-radius: 6px;
      font-weight: bold;
      font-size: 1.1rem;
      margin-bottom: 10px;
    }
    .competence-row {
      padding: 8px;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }
    .competence-row:last-child {
      border-bottom: none;
    }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: bold;
      min-width: 100px;
      text-align: center;
    }
    .badge-acquis {
      background: #27ae60;
      color: white;
    }
    .badge-encours {
      background: #f39c12;
      color: white;
    }
    .badge-nonacquis {
      background: #e74c3c;
      color: white;
    }
    .badge-nonevalue {
      background: #ecf0f1;
      color: #95a5a6;
    }
    .footer {
      margin-top: 30px;
      padding-top: 15px;
      border-top: 2px solid #e9ecef;
      font-size: 0.85rem;
      color: #7f8c8d;
    }
    .signature-zone {
      margin-top: 30px;
      display: flex;
      justify-content: space-between;
    }
    .signature-box {
      text-align: center;
      width: 40%;
    }
    .signature-line {
      margin-top: 50px;
      border-top: 1px solid #2c3e50;
      padding-top: 5px;
    }
  `;
  
  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>Bulletin ${eleve.prenom} ${eleve.nom}</title>
    <style>${css}</style>
  </head><body>`;
  
  // En-tête
  html += `
    <div class="header">
      <div>
        <h1>📋 Bulletin d'Évaluation</h1>
        <div style="font-size: 0.9rem; color: #7f8c8d; margin-top: 5px;">
          ${data.label} • Année scolaire 2025-2026
        </div>
      </div>
      <img src="logo.png" alt="Ma Petite Bib">
    </div>
  `;
  
  // Infos élève
  html += `
    <div class="info-eleve">
      <div><strong>Nom :</strong> ${eleve.nom}</div>
      <div><strong>Prénom :</strong> ${eleve.prenom}</div>
      <div><strong>Niveau :</strong> ${data.label}</div>
      <div><strong>Date d'édition :</strong> ${new Date().toLocaleDateString('fr-FR')}</div>
    </div>
  `;
  
  // Stats globales
  html += `
    <div class="stats-global">
      <div class="stat-item">
        <div class="stat-value stat-acquis">${acquis}</div>
        <div class="stat-label">✅ Acquis (${pctAcquis}%)</div>
      </div>
      <div class="stat-item">
        <div class="stat-value stat-encours">${enCours}</div>
        <div class="stat-label">🔶 En cours (${pctEnCours}%)</div>
      </div>
      <div class="stat-item">
        <div class="stat-value stat-nonacquis">${nonAcquis}</div>
        <div class="stat-label">⭕ Non acquis (${pctNonAcquis}%)</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">${total}</div>
        <div class="stat-label">Total compétences</div>
      </div>
    </div>
  `;
  
  // Compétences par domaine
  data.domaines.forEach(domaine => {
    // Ne montrer que les domaines avec au moins une compétence évaluée
    const competencesEvaluees = domaine.competences.filter(c => 
      evaluations[eleveActuel]?.[c.uuid]
    );
    
    if (competencesEvaluees.length === 0) return; // Ignorer les domaines non évalués
    
    html += `<div class="domaine-section">`;
    html += `<div class="domaine-title">${domaine.domaine}</div>`;
    
    domaine.competences.forEach(comp => {
      const eval = evaluations[eleveActuel]?.[comp.uuid];
      if (!eval) return; // N'afficher que les compétences évaluées
      
      let badge = '';
      if (eval === 'acquis') {
        badge = '<span class="badge badge-acquis">✅ Acquis</span>';
      } else if (eval === 'en-cours') {
        badge = '<span class="badge badge-encours">🔶 En cours</span>';
      } else if (eval === 'non-acquis') {
        badge = '<span class="badge badge-nonacquis">⭕ Non acquis</span>';
      }
      
      html += `
        <div class="competence-row">
          <span>${comp.competence}</span>
          ${badge}
        </div>
      `;
    });
    
    html += `</div>`;
  });
  
  // Zone de signature
  html += `
    <div class="signature-zone">
      <div class="signature-box">
        <div>L'enseignant(e)</div>
        <div class="signature-line"></div>
      </div>
      <div class="signature-box">
        <div>Les parents</div>
        <div class="signature-line"></div>
      </div>
    </div>
  `;
  
  // Footer
  html += `
    <div class="footer">
      <div style="text-align: center; margin-bottom: 10px;">
        Ce bulletin présente l'évaluation des compétences basée sur le référentiel officiel de l'Éducation Nationale.
      </div>
      <div style="text-align: center; font-weight: bold; color: #8b6f47;">
        © 2026 Ma Petite Bib - Tous droits réservés
      </div>
    </div>
  `;
  
  html += `</body></html>`;
  
  // Ouvrir dans une nouvelle fenêtre et imprimer
  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  setTimeout(() => {
    win.print();
  }, 500);
}

// Initialisation
chargerEleves();
document.getElementById('emptyState').style.display = 'block';

console.log('✅ Module d\'évaluation chargé - 703 compétences disponibles');
</script>

</body>
</html>
