<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=index-planner.html">
  <title>Redirection...</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #fffaf6;
      color: #3a2a2a;
    }
    .message {
      text-align: center;
    }
    .spinner {
      border: 3px solid #f5dde0;
      border-top: 3px solid #b57c84;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="message">
    <div class="spinner"></div>
    <p>Redirection vers Ma Petite Bib...</p>
    <p style="font-size: 0.85rem; color: #a07070;">Si la redirection ne fonctionne pas, <a href="index-planner.html" style="color: #b57c84;">cliquez ici</a>.</p>
  </div>
  <script>
    // Redirection JavaScript en backup
    setTimeout(() => {
      window.location.href = 'index-planner.html';
    }, 100);
  </script>
</body>
</html>
