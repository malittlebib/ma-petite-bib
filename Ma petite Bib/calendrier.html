<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendrier - Ma petite Bib</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
  color: #2c3e50;
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
}

/* Bouton Retour Hub */
.btn-retour-hub-float {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 9999;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 12px 20px;
  border-radius: 25px;
  text-decoration: none;
  font-weight: 700;
  font-size: 0.9rem;
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.3s ease;
}
.btn-retour-hub-float:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
}
@media print {
  .btn-retour-hub-float { display: none !important; }
}

.header {
  background: white;
  border-radius: 20px;
  padding: 30px;
  margin-bottom: 30px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 20px;
}

.header-left h1 {
  font-size: 2rem;
  font-weight: 800;
  color: #2c3e50;
  margin-bottom: 5px;
}

.header-left p {
  color: #7f8c8d;
}

.header-right {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
.btn-success { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); color: white; }
.btn-warning { background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%); color: white; }
.btn-danger { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); color: white; }

.main-grid {
  display: grid;
  grid-template-columns: 1fr 350px;
  gap: 20px;
}

/* CALENDRIER */
.calendar-section {
  background: white;
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

.calendar-header h2 {
  font-size: 1.8rem;
  font-weight: 800;
  color: #2c3e50;
}

.calendar-nav {
  display: flex;
  gap: 10px;
}

.calendar-nav button {
  width: 40px;
  height: 40px;
  border: none;
  background: #f8f9fa;
  border-radius: 10px;
  cursor: pointer;
  font-size: 1rem;
  transition: all 0.3s ease;
}

.calendar-nav button:hover {
  background: #e9ecef;
  transform: scale(1.1);
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
}

.calendar-day-header {
  text-align: center;
  font-weight: 700;
  color: #7f8c8d;
  font-size: 0.85rem;
  padding: 10px 0;
  text-transform: uppercase;
}

.calendar-day {
  aspect-ratio: 1;
  border: 2px solid #f1f3f5;
  border-radius: 12px;
  padding: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  background: white;
}

.calendar-day:hover {
  border-color: #667eea;
  background: #f8f9ff;
  transform: scale(1.05);
}

.calendar-day.other-month {
  opacity: 0.3;
}

.calendar-day.today {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border-color: #667eea;
}

.calendar-day.today .day-number {
  color: white;
}

.day-number {
  font-size: 1.1rem;
  font-weight: 700;
  color: #2c3e50;
  margin-bottom: 4px;
}

.day-events {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-top: 4px;
}

.event-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 4px;
}

.event-indicator {
  font-size: 0.65rem;
  padding: 2px 4px;
  border-radius: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  gap: 3px;
}

.event-anniversaire { background: #e3f2fd; color: #1976d2; }
.event-reunion { background: #e8f5e9; color: #2e7d32; }
.event-deadline { background: #fff3e0; color: #e65100; }
.event-deadline.haute { background: #ffebee; color: #c62828; }

/* SIDEBAR */
.sidebar {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.sidebar-section {
  background: white;
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.sidebar-section h3 {
  font-size: 1.2rem;
  font-weight: 800;
  color: #2c3e50;
  margin-bottom: 15px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.event-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-height: 400px;
  overflow-y: auto;
}

.event-item {
  padding: 12px;
  border-radius: 10px;
  border-left: 4px solid;
  background: #f8f9fa;
  cursor: pointer;
  transition: all 0.3s ease;
}

.event-item:hover {
  transform: translateX(5px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.event-item.anniversaire { border-left-color: #1976d2; }
.event-item.reunion { border-left-color: #2e7d32; }
.event-item.deadline { border-left-color: #e65100; }
.event-item.deadline.haute { border-left-color: #c62828; }

.event-item-date {
  font-size: 0.75rem;
  color: #7f8c8d;
  font-weight: 600;
  margin-bottom: 4px;
}

.event-item-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: #2c3e50;
  margin-bottom: 4px;
}

.event-item-details {
  font-size: 0.8rem;
  color: #95a5a6;
}

.event-item-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

.icon-btn {
  width: 28px;
  height: 28px;
  border: none;
  background: rgba(0,0,0,0.05);
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  font-size: 0.85rem;
}

.icon-btn:hover {
  background: rgba(0,0,0,0.1);
  transform: scale(1.1);
}

.icon-btn.edit { color: #3498db; }
.icon-btn.delete { color: #e74c3c; }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #95a5a6;
}

.empty-state i {
  font-size: 3rem;
  opacity: 0.3;
  margin-bottom: 15px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 10000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal.show { display: flex; }

.modal-content {
  background: white;
  border-radius: 20px;
  max-width: 600px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 10px 50px rgba(0,0,0,0.3);
}

.modal-header {
  padding: 25px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border-radius: 20px 20px 0 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-header h3 {
  font-size: 1.4rem;
  font-weight: 700;
}

.modal-close {
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  font-size: 1.5rem;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.3s ease;
}

.modal-close:hover {
  background: rgba(255,255,255,0.3);
  transform: rotate(90deg);
}

.modal-body {
  padding: 25px;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-weight: 700;
  color: #2c3e50;
  margin-bottom: 8px;
  font-size: 0.9rem;
}

.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 12px;
  border: 2px solid #e9ecef;
  border-radius: 10px;
  font-family: inherit;
  font-size: 0.9rem;
  transition: all 0.3s ease;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.form-group textarea {
  resize: vertical;
  min-height: 80px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.modal-footer {
  padding: 20px 25px;
  background: #f8f9fa;
  border-radius: 0 0 20px 20px;
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

.tabs {
  display: flex;
  gap: 5px;
  margin-bottom: 20px;
  background: #f8f9fa;
  padding: 5px;
  border-radius: 10px;
}

.tab {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  border-radius: 8px;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s ease;
  color: #7f8c8d;
}

.tab.active {
  background: white;
  color: #667eea;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

@media (max-width: 1024px) {
  .main-grid {
    grid-template-columns: 1fr;
  }
}

@media print {
  .btn-retour-hub-float, .header-right, .event-item-actions, .modal { display: none !important; }
}
</style>
</head>
<body>

<a href="index.html" class="btn-retour-hub-float">
  <i class="fas fa-home"></i> Hub
</a>

<div class="container">

  <div class="header">
    <div class="header-left">
      <h1><i class="fas fa-calendar-alt"></i> Calendrier 2025-2026</h1>
      <p>Anniversaires, réunions et échéances</p>
    </div>
    <div class="header-right">
      <button class="btn btn-success" onclick="ouvrirModal('anniversaire')">
        <i class="fas fa-birthday-cake"></i> Anniversaire
      </button>
      <button class="btn btn-primary" onclick="ouvrirModal('reunion')">
        <i class="fas fa-users"></i> Réunion
      </button>
      <button class="btn btn-warning" onclick="ouvrirModal('deadline')">
        <i class="fas fa-flag"></i> Deadline
      </button>
    </div>
  </div>

  <div class="main-grid">
    
    <!-- CALENDRIER -->
    <div class="calendar-section">
      <div class="calendar-header">
        <h2 id="currentMonth">Janvier 2026</h2>
        <div class="calendar-nav">
          <button onclick="moisPrecedent()"><i class="fas fa-chevron-left"></i></button>
          <button onclick="aujourdhui()"><i class="fas fa-calendar-day"></i></button>
          <button onclick="moisSuivant()"><i class="fas fa-chevron-right"></i></button>
        </div>
      </div>
      
      <div class="calendar-grid" id="calendarGrid">
        <!-- Généré par JS -->
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      
      <div class="sidebar-section">
        <h3><i class="fas fa-clock"></i> À venir</h3>
        <div class="event-list" id="upcomingEvents"></div>
      </div>

      <div class="sidebar-section">
        <h3><i class="fas fa-list"></i> Tous les événements</h3>
        <div class="tabs">
          <button class="tab active" onclick="filtrerEvenements('tous')">Tous</button>
          <button class="tab" onclick="filtrerEvenements('anniversaire')">🎂</button>
          <button class="tab" onclick="filtrerEvenements('reunion')">👥</button>
          <button class="tab" onclick="filtrerEvenements('deadline')">📋</button>
        </div>
        <div class="event-list" id="allEvents"></div>
      </div>

    </div>

  </div>

</div>

<!-- MODAL ÉVÉNEMENT -->
<div class="modal" id="modalEvent">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">Nouvel événement</h3>
      <button class="modal-close" onclick="fermerModal()">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="eventId">
      <input type="hidden" id="eventType">
      
      <div class="form-group">
        <label>Titre / Nom</label>
        <input type="text" id="eventTitle" placeholder="Ex: Lucas Martin">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="eventDate">
        </div>
        <div class="form-group" id="eventTimeGroup" style="display: none;">
          <label>Heure</label>
          <input type="time" id="eventTime">
        </div>
      </div>

      <div class="form-group" id="eventLieuGroup" style="display: none;">
        <label>Lieu</label>
        <input type="text" id="eventLieu" placeholder="Ex: Salle polyvalente">
      </div>

      <div class="form-group" id="eventPrioriteGroup" style="display: none;">
        <label>Priorité</label>
        <select id="eventPriorite">
          <option value="basse">Basse</option>
          <option value="moyenne">Moyenne</option>
          <option value="haute">Haute</option>
        </select>
      </div>

      <div class="form-group">
        <label>Notes</label>
        <textarea id="eventNotes" placeholder="Détails supplémentaires..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="fermerModal()">Annuler</button>
      <button class="btn btn-success" onclick="sauvegarderEvent()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// VARIABLES
var currentDate = new Date();
var currentMonth = currentDate.getMonth();
var currentYear = currentDate.getFullYear();
var events = {};
var filtreActif = 'tous';

// INIT
document.addEventListener('DOMContentLoaded', function() {
  console.log('📅 Calendrier chargé');
  chargerEvenements();
  afficherCalendrier();
  afficherEvenementsAVenir();
  afficherTousEvenements();
});

// CHARGER ÉVÉNEMENTS
function chargerEvenements() {
  try {
    var saved = localStorage.getItem('calendrier_events');
    if (saved) {
      events = JSON.parse(saved);
      
      // NETTOYAGE : Vérifier que toutes les valeurs sont des tableaux
      var cleaned = false;
      Object.keys(events).forEach(function(date) {
        if (!Array.isArray(events[date])) {
          console.warn('⚠️ Nettoyage de données corrompues:', date, events[date]);
          delete events[date];
          cleaned = true;
        }
      });
      
      // Si on a nettoyé, sauvegarder la version propre
      if (cleaned) {
        console.log('✅ Données nettoyées et sauvegardées');
        sauvegarder();
      }
    }
  } catch(e) {
    console.error('Erreur chargement:', e);
    // En cas d'erreur, réinitialiser
    events = {};
    sauvegarder();
  }
}

// SAUVEGARDER
function sauvegarder() {
  localStorage.setItem('calendrier_events', JSON.stringify(events));
}

// AFFICHER CALENDRIER
function afficherCalendrier() {
  var mois = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin',
              'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
  
  document.getElementById('currentMonth').textContent = mois[currentMonth] + ' ' + currentYear;
  
  var grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';
  
  // En-têtes jours
  var jours = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
  jours.forEach(function(jour) {
    var header = document.createElement('div');
    header.className = 'calendar-day-header';
    header.textContent = jour;
    grid.appendChild(header);
  });
  
  // Premier jour du mois
  var firstDay = new Date(currentYear, currentMonth, 1);
  var lastDay = new Date(currentYear, currentMonth + 1, 0);
  var startDay = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
  
  // Jours du mois précédent
  var prevMonth = new Date(currentYear, currentMonth, 0);
  for (var i = startDay - 1; i >= 0; i--) {
    var day = prevMonth.getDate() - i;
    var cell = creerJourCalendrier(day, true);
    grid.appendChild(cell);
  }
  
  // Jours du mois actuel
  for (var day = 1; day <= lastDay.getDate(); day++) {
    var cell = creerJourCalendrier(day, false);
    grid.appendChild(cell);
  }
  
  // Compléter la grille
  var totalCells = grid.children.length - 7;
  var remaining = 42 - totalCells;
  for (var day = 1; day <= remaining; day++) {
    var cell = creerJourCalendrier(day, true);
    grid.appendChild(cell);
  }
}

// CRÉER JOUR CALENDRIER
function creerJourCalendrier(day, otherMonth) {
  var cell = document.createElement('div');
  cell.className = 'calendar-day';
  if (otherMonth) cell.classList.add('other-month');
  
  var dateStr = currentYear + '-' + 
                String(currentMonth + 1).padStart(2, '0') + '-' + 
                String(day).padStart(2, '0');
  
  // Aujourd'hui
  var today = new Date();
  if (!otherMonth && 
      day === today.getDate() && 
      currentMonth === today.getMonth() && 
      currentYear === today.getFullYear()) {
    cell.classList.add('today');
  }
  
  var dayNum = document.createElement('div');
  dayNum.className = 'day-number';
  dayNum.textContent = day;
  cell.appendChild(dayNum);
  
  // Événements du jour
  if (!otherMonth && events[dateStr] && Array.isArray(events[dateStr])) {
    var eventsDiv = document.createElement('div');
    eventsDiv.className = 'day-events';
    
    events[dateStr].forEach(function(evt) {
      var indicator = document.createElement('div');
      indicator.className = 'event-indicator event-' + evt.type;
      if (evt.type === 'deadline' && evt.priorite === 'haute') {
        indicator.classList.add('haute');
      }
      
      var icon = evt.type === 'anniversaire' ? '🎂' : 
                 evt.type === 'reunion' ? '👥' : '📋';
      
      indicator.innerHTML = icon;
      eventsDiv.appendChild(indicator);
    });
    
    cell.appendChild(eventsDiv);
  }
  
  cell.onclick = function() {
    if (!otherMonth) {
      ouvrirModalJour(dateStr);
    }
  };
  
  return cell;
}

// NAVIGATION
function moisPrecedent() {
  currentMonth--;
  if (currentMonth < 0) {
    currentMonth = 11;
    currentYear--;
  }
  afficherCalendrier();
}

function moisSuivant() {
  currentMonth++;
  if (currentMonth > 11) {
    currentMonth = 0;
    currentYear++;
  }
  afficherCalendrier();
}

function aujourdhui() {
  var today = new Date();
  currentMonth = today.getMonth();
  currentYear = today.getFullYear();
  afficherCalendrier();
}

// OUVRIR MODAL
function ouvrirModal(type, event) {
  var modal = document.getElementById('modalEvent');
  modal.classList.add('show');
  
  document.getElementById('eventType').value = type;
  
  if (event) {
    document.getElementById('modalTitle').textContent = 'Modifier événement';
    document.getElementById('eventId').value = event.id;
    document.getElementById('eventTitle').value = event.titre;
    document.getElementById('eventDate').value = event.date;
    document.getElementById('eventTime').value = event.heure || '';
    document.getElementById('eventLieu').value = event.lieu || '';
    document.getElementById('eventPriorite').value = event.priorite || 'moyenne';
    document.getElementById('eventNotes').value = event.notes || '';
  } else {
    document.getElementById('modalTitle').textContent = 
      type === 'anniversaire' ? 'Nouvel anniversaire' :
      type === 'reunion' ? 'Nouvelle réunion' : 'Nouvelle deadline';
    
    document.getElementById('eventId').value = '';
    document.getElementById('eventTitle').value = '';
    document.getElementById('eventDate').value = '';
    document.getElementById('eventTime').value = '';
    document.getElementById('eventLieu').value = '';
    document.getElementById('eventPriorite').value = 'moyenne';
    document.getElementById('eventNotes').value = '';
  }
  
  // Champs conditionnels
  document.getElementById('eventTimeGroup').style.display = 
    type === 'reunion' ? 'block' : 'none';
  document.getElementById('eventLieuGroup').style.display = 
    type === 'reunion' ? 'block' : 'none';
  document.getElementById('eventPrioriteGroup').style.display = 
    type === 'deadline' ? 'block' : 'none';
}

function ouvrirModalJour(dateStr) {
  // TODO: afficher les événements du jour
  console.log('Jour cliqué:', dateStr);
}

function fermerModal() {
  document.getElementById('modalEvent').classList.remove('show');
}

// SAUVEGARDER ÉVÉNEMENT
function sauvegarderEvent() {
  var type = document.getElementById('eventType').value;
  var titre = document.getElementById('eventTitle').value;
  var date = document.getElementById('eventDate').value;
  
  if (!titre || !date) {
    alert('Veuillez remplir les champs obligatoires');
    return;
  }
  
  var event = {
    id: document.getElementById('eventId').value || Date.now().toString(),
    type: type,
    titre: titre,
    date: date,
    heure: document.getElementById('eventTime').value,
    lieu: document.getElementById('eventLieu').value,
    priorite: document.getElementById('eventPriorite').value,
    notes: document.getElementById('eventNotes').value
  };
  
  if (!events[date]) events[date] = [];
  
  var existingIndex = events[date].findIndex(function(e) { return e.id === event.id; });
  if (existingIndex >= 0) {
    events[date][existingIndex] = event;
  } else {
    events[date].push(event);
  }
  
  sauvegarder();
  fermerModal();
  afficherCalendrier();
  afficherEvenementsAVenir();
  afficherTousEvenements();
}

// AFFICHER ÉVÉNEMENTS À VENIR
function afficherEvenementsAVenir() {
  var container = document.getElementById('upcomingEvents');
  container.innerHTML = '';
  
  var today = new Date();
  today.setHours(0, 0, 0, 0);
  
  var upcoming = [];
  
  Object.keys(events).forEach(function(date) {
    var eventDate = new Date(date);
    if (eventDate >= today) {
      // Vérifier que events[date] est bien un tableau
      if (Array.isArray(events[date])) {
        events[date].forEach(function(evt) {
          upcoming.push(Object.assign({}, evt, {dateKey: date}));
        });
      } else {
        console.warn('⚠️ Données corrompues pour la date:', date);
        delete events[date];
      }
    }
  });
  
  upcoming.sort(function(a, b) {
    return new Date(a.dateKey) - new Date(b.dateKey);
  });
  
  if (upcoming.length === 0) {
    container.innerHTML = '<div class="empty-state"><i class="fas fa-calendar-check"></i><p>Aucun événement à venir</p></div>';
    return;
  }
  
  upcoming.slice(0, 5).forEach(function(evt) {
    container.appendChild(creerItemEvent(evt));
  });
}

// AFFICHER TOUS LES ÉVÉNEMENTS
function afficherTousEvenements() {
  var container = document.getElementById('allEvents');
  container.innerHTML = '';
  
  var allEvents = [];
  
  Object.keys(events).forEach(function(date) {
    // Vérifier que events[date] est bien un tableau
    if (Array.isArray(events[date])) {
      events[date].forEach(function(evt) {
        if (filtreActif === 'tous' || evt.type === filtreActif) {
          allEvents.push(Object.assign({}, evt, {dateKey: date}));
        }
      });
    } else {
      // Nettoyer les données corrompues
      console.warn('⚠️ Données corrompues pour la date:', date, '- Nettoyage...');
      delete events[date];
    }
  });
  
  allEvents.sort(function(a, b) {
    return new Date(a.dateKey) - new Date(b.dateKey);
  });
  
  if (allEvents.length === 0) {
    container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>Aucun événement</p></div>';
    return;
  }
  
  allEvents.forEach(function(evt) {
    container.appendChild(creerItemEvent(evt));
  });
}

// CRÉER ITEM ÉVÉNEMENT
function creerItemEvent(evt) {
  var item = document.createElement('div');
  item.className = 'event-item ' + evt.type;
  if (evt.type === 'deadline' && evt.priorite === 'haute') {
    item.classList.add('haute');
  }
  
  var dateFormatted = new Date(evt.dateKey).toLocaleDateString('fr-FR', {
    weekday: 'short',
    day: 'numeric',
    month: 'short',
    year: 'numeric'
  });
  
  var html = '<div class="event-item-date">' + dateFormatted;
  if (evt.heure) html += ' • ' + evt.heure;
  html += '</div>';
  
  // Supporter title (anniversaires) ET titre (autres événements)
  var eventTitle = evt.title || evt.titre || 'Événement';
  html += '<div class="event-item-title">' + eventTitle + '</div>';
  
  var details = [];
  if (evt.lieu) details.push('📍 ' + evt.lieu);
  if (evt.priorite && evt.type === 'deadline') {
    details.push('🚩 ' + evt.priorite.charAt(0).toUpperCase() + evt.priorite.slice(1));
  }
  // Supporter description (anniversaires) ET notes (autres)
  var eventNotes = evt.description || evt.notes;
  if (eventNotes) details.push(eventNotes);
  
  if (details.length > 0) {
    html += '<div class="event-item-details">' + details.join(' • ') + '</div>';
  }
  
  html += '<div class="event-item-actions">';
  html += '<button class="icon-btn edit" onclick=\'editerEvent(' + JSON.stringify(evt).replace(/'/g, "\\'") + ')\'><i class="fas fa-edit"></i></button>';
  html += '<button class="icon-btn delete" onclick="supprimerEvent(\'' + evt.dateKey + '\', \'' + evt.id + '\')"><i class="fas fa-trash"></i></button>';
  html += '</div>';
  
  item.innerHTML = html;
  return item;
}

// ÉDITER ÉVÉNEMENT
function editerEvent(evt) {
  ouvrirModal(evt.type, evt);
}

// SUPPRIMER ÉVÉNEMENT
function supprimerEvent(date, id) {
  if (!confirm('Supprimer cet événement ?')) return;
  
  // Vérifier que events[date] existe et est un tableau
  if (events[date] && Array.isArray(events[date])) {
    events[date] = events[date].filter(function(e) { return e.id !== id; });
    if (events[date].length === 0) delete events[date];
  }
  
  sauvegarder();
  afficherCalendrier();
  afficherEvenementsAVenir();
  afficherTousEvenements();
}

// FILTRER ÉVÉNEMENTS
function filtrerEvenements(type) {
  filtreActif = type;
  
  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.classList.remove('active');
  });
  event.target.classList.add('active');
  
  afficherTousEvenements();
}

console.log('✅ Calendrier prêt !');
</script>
