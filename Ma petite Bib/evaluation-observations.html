/* Thème par défaut : Rose Planner */
:root {
  --primary: #b57c84;
  --primary-dark: #745252;
  --primary-light: #c9909a;
  --success: #27ae60;
  --warning: #f39c12;
  --danger: #e74c3c;
  --info: #3498db;
  --light: #fdf0f1;
  --dark: #3a2a2a;
  --cream: #fffaf6;
  --rose-pale: #f5dde0;
  --text-mid: #6b4848;
  --white: #ffffff;
}

/* Thème alternatif : Beige Classic */
[data-theme="beige"] {
  --primary: #8b6f47;
  --primary-dark: #6b5435;
  --primary-light: #a68a5e;
  --success: #27ae60;
  --warning: #f39c12;
  --danger: #e74c3c;
  --info: #3498db;
  --light: #f5f1eb;
  --dark: #2d2520;
  --cream: #faf8f5;
  --rose-pale: #e8dfd3;
  --text-mid: #6b5d52;
  --white: #ffffff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--cream);
  min-height: 100vh;
  padding: 20px;
}

.container {

}

/* HEADER */
.header {

  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
  display: flex;

  align-items: center;
  flex-wrap: wrap;
  gap: 20px;
}

.header-title {
  display: flex;
  align-items: center;
  gap: 15px;
}

.header-icon {
  font-size: 3rem;
}

.header-title h1 {
  font-size: 2rem;
  color: var(--primary);
  margin-bottom: 5px;
}

.header-title p {
  color: #7f8c8d;
  font-size: 0.95rem;
}

.header-actions {
  display: flex;
  gap: 10px;
}

.btn {
  padding: 12px 24px;
  border: none;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
  font-size: 0.95rem;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary {

}

.btn-primary:hover {

}

.btn-secondary {
  background: #7f8c8d;

}

.btn-secondary:hover {

}

.btn-success {
  background: #27ae60;
  color: white;
}

.btn-success:hover {
  background: #229954;
}

/* STUDENTS SELECTOR */
.students-selector {

  padding: 25px;
  border-radius: 15px;
  margin-bottom: 30px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.students-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 15px;
}

.student-card {
  background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  border: 3px solid transparent;
}

.student-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 20px rgba(102,126,234,0.2);
  border-color: var(--primary);
}

.student-card.active {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  border-color: var(--primary);
}

.student-avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 700;
  font-size: 1.5rem;
  margin: 0 auto 10px;
}

.student-card.active .student-avatar {
  background: #ffffff;
  color: var(--primary);
}

.student-name {
  font-weight: 600;
  font-size: 1rem;
}

/* TABS */
.tabs {

  padding: 0;
  border-radius: 15px 15px 0 0;
  display: flex;
  gap: 5px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  overflow-x: auto;
}

.tab {
  padding: 20px 30px;
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  cursor: pointer;
  font-weight: 600;
  font-size: 1rem;
  color: #7f8c8d;
  transition: all 0.3s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 10px;
}

.tab:hover {
  background: #f8f9fa;
  color: var(--primary);
}

.tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
  background: #f8f9fa;
}

/* CONTENT */
.content-area {

  padding: 40px;
  border-radius: 0 0 15px 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  min-height: 500px;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
  animation: fadeIn 0.3s;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.observation-header {

.observation-header h2 {

.observations-list {

.observation-card {

  padding: 25px;

}

.observation-card:hover {
  transform: translateX(5px);

}

.observation-meta {

.observation-date {

.observation-domaine {

.observation-text {

.btn-delete {

.btn-delete:hover {

.empty-state {

.competences-grid {

/* PROGRESS BAR */
.progress-section {

  border-radius: 15px;
  margin-bottom: 30px;

}

.progress-header {
  display: flex;

.progress-title {

.progress-percentage {

.progress-bar {
  background: rgba(255,255,255,0.3);
  height: 20px;
  border-radius: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: #ffffff;
  transition: width 0.5s ease;
  border-radius: 10px;
}

/* MODAL */
.modal {

  left: 0;

.modal.active {

.modal-content {

.modal-close:hover {

.form-group {

.form-group label {

.form-group select,
.form-group textarea,

.form-group textarea {

.form-group select:focus,

@media (max-width: 768px) {

/* PRINT */
@media print {
  body {

  }

  .btn,
  .tabs {
    display: none;
  }

    box-shadow: none;
  }
}
</style>
</head>

function chargerTheme() {
  const savedTheme = localStorage.getItem('app_theme') || 'rose';
  if (savedTheme === 'beige') {
    document.documentElement.setAttribute('data-theme', 'beige');
  }
}
chargerTheme();


// DONNÉES

let niveauClasse = 'GS'; // Par défaut GS

// Déterminer la période actuelle selon le mois
function getPeriodeActuelle() {
  const mois = new Date().getMonth() + 1; // 1-12
  if (mois >= 9 && mois <= 10) return 'P1';
  if (mois >= 11 && mois <= 12) return 'P2';
  if (mois >= 1 && mois <= 2) return 'P3';
  if (mois >= 3 && mois <= 4) return 'P4';
  if (mois >= 5 && mois <= 6) return 'P5';
  return 'P1'; // Par défaut
}

let currentPeriode = getPeriodeActuelle(); // Période actuelle automatique

let evaluations = {};

// Détecter le niveau de classe depuis localStorage via SyncData

}

// INIT
document.addEventListener('DOMContentLoaded', function() {
  detecterNiveau(); // Détecter le niveau au chargement
  chargerEleves();
  chargerDonnees();
  
  // Initialiser le select avec la période actuelle
  document.getElementById('periodeSelect').value = currentPeriode;
  
  // Mettre à jour l'affichage initial
  const info = periodesInfo[currentPeriode];
  document.getElementById('periodeInfo').innerHTML = `
    <i class="fas fa-info-circle"></i> ${info.icon} ${info.nom}
  `;
  
  afficherEleves();
});

// CHANGER NIVEAU
function changerNiveau() {
  niveauClasse = document.getElementById('niveauSelect').value;
  window.SyncData.setNiveau(niveauClasse);
  
  // Rafraîchir l'affichage des évaluations
  afficherEvaluations();
}

// CHARGER ÉLÈVES
function chargerEleves() {
  // Utiliser SyncData pour charger les élèves
  eleves = window.SyncData.getEleves();
  
  if (eleves.length > 0) {
    currentEleve = eleves[0].id;
  }
}

// CHARGER DONNÉES
function chargerDonnees() {
  const savedObs = localStorage.getItem('observations_eleves');
  if (savedObs) observations = JSON.parse(savedObs);
  
  const savedEval = localStorage.getItem('evaluations_eleves');
  if (savedEval) evaluations = JSON.parse(savedEval);
}

// SAUVEGARDER
function sauvegarderDonnees() {
  localStorage.setItem('observations_eleves', JSON.stringify(observations));
  localStorage.setItem('evaluations_eleves', JSON.stringify(evaluations));
}

// AFFICHER ÉLÈVES
function afficherEleves() {
  const grid = document.getElementById('studentsGrid');
  grid.innerHTML = eleves.map(eleve => `
    <div class="student-card ${eleve.id === currentEleve ? 'active' : ''}" onclick="selectionnerEleve(${eleve.id})">
      <div class="student-avatar">${eleve.nom.substring(0, 2).toUpperCase()}</div>
      <div class="student-name">${eleve.nom}</div>
    </div>
  `).join('');
  
  afficherObservations();
  afficherEvaluations();
}

// SÉLECTIONNER ÉLÈVE
function selectionnerEleve(eleveId) {
  currentEleve = eleveId;
  afficherEleves();
}

// CHANGER PÉRIODE
function changerPeriode() {
  currentPeriode = document.getElementById('periodeSelect').value;
  
  // Mettre à jour l'info
  const info = periodesInfo[currentPeriode];
  document.getElementById('periodeInfo').innerHTML = `
    <i class="fas fa-info-circle"></i> ${info.icon} ${info.nom}
  `;
  
  // Rafraîchir l'affichage
  afficherObservations();
  afficherEvaluations();
}

// TABS
// === OBSERVATIONS ===

function afficherObservations() {
  const container = document.getElementById('observationsList');
  const obsEleve = observations[currentEleve] || [];
  
  // Filtrer par période si ce n'est pas la vue annuelle
  let obsFiltrees = obsEleve;
  if (currentPeriode !== 'annee') {
    obsFiltrees = obsEleve.filter(obs => obs.periode === currentPeriode);
  }
  
  if (obsFiltrees.length === 0) {
    const message = currentPeriode === 'annee' 
      ? 'Aucune observation pour cet élève'
      : `Aucune observation pour la ${periodesInfo[currentPeriode].nom}`;
    container.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-clipboard"></i>
        <p>${message}</p>
      </div>
    `;
    return;
  }
  
  container.innerHTML = obsFiltrees.map((obs, index) => {
    // Trouver l'index réel pour la suppression
    const realIndex = obsEleve.indexOf(obs);
    return `
    <div class="observation-card">
      <div class="observation-meta">
        <div>
          <div class="observation-date">
            <i class="fas fa-calendar"></i> ${new Date(obs.date).toLocaleDateString('fr-FR')}
            ${obs.periode ? ` • ${periodesInfo[obs.periode].icon} ${obs.periode}` : ''}
          </div>
          <div class="observation-domaine">${obs.domaine}</div>
        </div>
        <button class="btn-delete" onclick="supprimerObservation(${realIndex})">
          <i class="fas fa-trash"></i>
        </button>
      </div>
      <div class="observation-text">${obs.texte}</div>
    </div>
  `}).join('');
}

function ouvrirModalObservation() {
  document.getElementById('modalObservation').classList.add('active');
}

function fermerModalObservation() {
  document.getElementById('modalObservation').classList.remove('active');
  document.getElementById('observationTexte').value = '';
}

function sauvegarderObservation() {
  const periode = document.getElementById('observationPeriode').value;
  const domaine = document.getElementById('observationDomaine').value;
  const texte = document.getElementById('observationTexte').value.trim();
  
  if (!texte) {
    alert('Veuillez saisir une observation');
    return;
  }
  
  if (!observations[currentEleve]) {
    observations[currentEleve] = [];
  }
  
  observations[currentEleve].push({
    date: new Date().toISOString(),
    periode: periode,
    domaine: domaine,
    texte: texte
  });
  
  sauvegarderDonnees();
  afficherObservations();
  fermerModalObservation();
}

function supprimerObservation(index) {
  if (confirm('Supprimer cette observation ?')) {
    observations[currentEleve].splice(index, 1);
    sauvegarderDonnees();
    afficherObservations();
  }
}

// === EVALUATIONS ===

function afficherEvaluations() {
  const container = document.getElementById('competencesContainer');
  
  // Déterminer quelle période afficher
  let periodeAffichage = currentPeriode;
  let messageInfo = '';
  
  if (currentPeriode === 'annee') {
    // En vue annuelle, on montre P5 (compétences finales)
    periodeAffichage = 'P5';
    messageInfo = `
      <div style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); padding: 20px; border-radius: 15px; margin-bottom: 30px; color: white;">
        <h3 style="margin-bottom: 10px;"><i class="fas fa-chart-line"></i> Vue annuelle - Compétences de fin d'année</h3>
        <p style="opacity: 0.95; margin-bottom: 10px;">En vue annuelle, les compétences attendues en <strong>Période 5 (fin d'année)</strong> sont affichées.</p>
        <p style="opacity: 0.95;"><i class="fas fa-lightbulb"></i> <strong>Astuce :</strong> Sélectionnez une période spécifique (P1 à P5) pour voir les compétences progressives adaptées à chaque moment de l'année.</p>
      </div>
    `;
  } else {
    // Message pour les périodes spécifiques
    messageInfo = `
      <div style="background: linear-gradient(135deg, #27ae60 0%, #229954 100%); padding: 15px 20px; border-radius: 12px; margin-bottom: 25px; color: white; display: flex; align-items: center; gap: 15px;">
        <i class="fas fa-check-circle" style="font-size: 2rem;"></i>
        <div>
          <strong style="font-size: 1.1rem;">${periodesInfo[currentPeriode].icon} ${periodesInfo[currentPeriode].nom}</strong>
          <p style="opacity: 0.95; margin-top: 5px; font-size: 0.95rem;">Compétences adaptées à cette période de l'année</p>
        </div>
      </div>
    `;
  }
  
  // Créer une clé unique pour la période actuelle
  const evalKey = currentPeriode === 'annee' ? 'annee' : currentPeriode;
  
  if (!evaluations[currentEleve]) {
    evaluations[currentEleve] = {};
  }
  
  if (!evaluations[currentEleve][evalKey]) {
    evaluations[currentEleve][evalKey] = {};
  }
  
  // Utiliser les compétences de la période appropriée SELON LE NIVEAU
  let toutesCompetences;
  if (niveauClasse === 'PS') {
    toutesCompetences = competencesPS || {};
  } else if (niveauClasse === 'MS') {
    toutesCompetences = competencesMS || {};
  } else {
    toutesCompetences = competencesGS || {};
  }
  
  const competencesPeriode = toutesCompetences[periodeAffichage] || toutesCompetences['P1'] || {};
  
  container.innerHTML = messageInfo + Object.entries(competencesPeriode).map(([domaine, competences]) => `
    <div class="competences-section">
      <h3><i class="fas fa-graduation-cap"></i> ${domaine}</h3>
      <div class="competences-grid">
        ${competences.map(comp => {
          const key = `${domaine}_${comp}`;
          const checked = evaluations[currentEleve][evalKey][key] || false;
          return `
            <div class="competence-item ${checked ? 'checked' : ''}" onclick="toggleCompetence('${key.replace(/'/g, "\\'")}')">
              <div class="competence-checkbox">
                ${checked ? '<i class="fas fa-check"></i>' : ''}
              </div>
              <div class="competence-text">${comp}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `).join('');
  
  calculerProgression();
}

function toggleCompetence(key) {
  const evalKey = currentPeriode === 'annee' ? 'annee' : currentPeriode;
  
  if (!evaluations[currentEleve]) {
    evaluations[currentEleve] = {};
  }
  
  if (!evaluations[currentEleve][evalKey]) {
    evaluations[currentEleve][evalKey] = {};
  }
  
  evaluations[currentEleve][evalKey][key] = !evaluations[currentEleve][evalKey][key];
  sauvegarderDonnees();
  afficherEvaluations();
}

function calculerProgression() {
  const evalKey = currentPeriode === 'annee' ? 'annee' : currentPeriode;
  
  // Utiliser la période appropriée pour le calcul
  let periodeCalc = currentPeriode === 'annee' ? 'P5' : currentPeriode;
  
  // Charger les compétences selon le niveau
  let toutesCompetences;
  if (niveauClasse === 'PS') {
    toutesCompetences = competencesPS || {};
  } else if (niveauClasse === 'MS') {
    toutesCompetences = competencesMS || {};
  } else {
    toutesCompetences = competencesGS || {};
  }
  
  const competencesPeriode = toutesCompetences[periodeCalc] || toutesCompetences['P1'] || {};
  
  const total = Object.values(competencesPeriode).reduce((sum, comps) => sum + comps.length, 0);
  const acquis = Object.values(evaluations[currentEleve]?.[evalKey] || {}).filter(v => v).length;
  const percentage = Math.round((acquis / total) * 100);
  
  document.getElementById('progressPercentage').textContent = percentage + '%';
  document.getElementById('progressFill').style.width = percentage + '%';
}

// === EXPORT PDF ===

async function exporterEvaluationPDF() {
  if (!currentEleve) {
    alert('Veuillez sélectionner un élève');
    return;
  }
  
  // Récupérer l'élève
  const eleve = eleves.find(e => e.id === currentEleve);
  if (!eleve) return;
  
  // Récupérer les infos de niveau et période
  const niveauInfo = window.SyncData.getNiveauInfo();
  const periodeInfo = periodesInfo[currentPeriode];
  
  // Générer le nom du fichier
  const nomFichier = `Evaluation_${eleve.nom.replace(/\s/g, '_')}_${niveauInfo.code}_${currentPeriode === 'annee' ? 'Annuel' : currentPeriode}.pdf`;
  
  // Créer une zone d'export temporaire
  const exportZone = document.createElement('div');
  exportZone.style.cssText = 'position: absolute; left: -9999px; width: 210mm; background: #ffffff; padding: 20mm;';
  
  // Construire le contenu
  exportZone.innerHTML = `
    <div style="font-family: Arial, sans-serif;">
      <!-- En-tête -->
      <div style="text-align: center; margin-bottom: 30px; border-bottom: 3px solid ${niveauInfo.couleur}; padding-bottom: 20px;">
        <h1 style="color: ${niveauInfo.couleur}; margin: 0 0 10px 0; font-size: 28px;">
          ${niveauInfo.emoji} Évaluation & Observations
        </h1>
        <h2 style="margin: 0; font-size: 22px; color: #2c3e50;">
          ${eleve.nom}
        </h2>
        <p style="margin: 10px 0 0 0; color: #7f8c8d; font-size: 16px;">
          ${niveauInfo.nom} • ${periodeInfo.icon} ${periodeInfo.nom}
        </p>
      </div>
      
      <!-- Observations -->
      <div style="margin-bottom: 40px;">
        <h3 style="background: ${niveauInfo.couleur}; color: white; padding: 12px 20px; border-radius: 8px; font-size: 18px; margin-bottom: 20px;">
          📒 Carnet d'observations
        </h3>
        ${genererObservationsPDF(eleve.id)}
      </div>
      
      <!-- Évaluations -->
      <div style="page-break-before: always;">
        <h3 style="background: ${niveauInfo.couleur}; color: white; padding: 12px 20px; border-radius: 8px; font-size: 18px; margin-bottom: 20px;">
          ✅ Grille d'évaluation
        </h3>
        ${genererEvaluationsPDF(eleve.id)}
      </div>
      
      <!-- Pied de page -->
      <div style="margin-top: 40px; padding-top: 20px; border-top: 2px solid #e9ecef; text-align: center; color: #7f8c8d; font-size: 12px;">
        Document généré le ${new Date().toLocaleDateString('fr-FR')} - Ma Petite Bib
      </div>
    </div>
  `;
  
  document.body.appendChild(exportZone);
  
  // Exporter en PDF
  await window.PDFExporter.exporterHTML(exportZone, {
    nomFichier: nomFichier,
    orientation: 'portrait',
    format: 'a4'
  });
  
  // Nettoyer
  document.body.removeChild(exportZone);
}

function genererObservationsPDF(eleveId) {
  const obsEleve = observations[eleveId] || [];
  
  // Filtrer par période si nécessaire
  let obsFiltrees = obsEleve;
  if (currentPeriode !== 'annee') {
    obsFiltrees = obsEleve.filter(obs => obs.periode === currentPeriode);
  }
  
  if (obsFiltrees.length === 0) {
    return '<p style="color: #7f8c8d; font-style: italic; padding: 20px; background: #f8f9fa; border-radius: 8px;">Aucune observation pour cette période</p>';
  }
  
  return obsFiltrees.map(obs => `
    <div style="background: #FFF9E6; padding: 15px; margin-bottom: 15px; border-left: 5px solid #FFD93D; border-radius: 8px;">
      <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px;">
        <span style="color: #7f8c8d;">
          📅 ${new Date(obs.date).toLocaleDateString('fr-FR')}
        </span>
        <span style="background: #8b6f47; color: white; padding: 4px 12px; border-radius: 12px; font-weight: 600; font-size: 12px;">
          ${obs.domaine}
        </span>
      </div>
      <p style="margin: 0; line-height: 1.6; color: #2c3e50;">
        ${obs.texte}
      </p>
    </div>
  `).join('');
}

function genererEvaluationsPDF(eleveId) {
  const evalKey = currentPeriode === 'annee' ? 'annee' : currentPeriode;
  const evals = evaluations[eleveId]?.[evalKey] || {};
  
  // Charger les compétences selon le niveau
  let toutesCompetences;
  if (niveauClasse === 'PS') {
    toutesCompetences = competencesPS || {};
  } else if (niveauClasse === 'MS') {
    toutesCompetences = competencesMS || {};
  } else {
    toutesCompetences = competencesGS || {};
  }
  
  const periodeAffichage = currentPeriode === 'annee' ? 'P5' : currentPeriode;
  const competencesPeriode = toutesCompetences[periodeAffichage] || {};
  
  // Calculer progression
  const total = Object.values(competencesPeriode).reduce((sum, comps) => sum + comps.length, 0);
  const acquis = Object.values(evals).filter(v => v).length;
  const percentage = Math.round((acquis / total) * 100);
  
  let html = `
    <div style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; padding: 20px; border-radius: 12px; margin-bottom: 25px;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div style="font-size: 18px; font-weight: 700;">Progression globale</div>
        <div style="font-size: 32px; font-weight: 800;">${percentage}%</div>
      </div>
      <div style="background: rgba(255,255,255,0.3); height: 20px; border-radius: 10px; margin-top: 15px; overflow: hidden;">
        <div style="background: #ffffff; height: 100%; width: ${percentage}%; border-radius: 10px;"></div>
      </div>
    </div>
  `;
  
  // Ajouter les compétences par domaine
  Object.entries(competencesPeriode).forEach(([domaine, competences]) => {
    html += `
      <div style="margin-bottom: 25px;">
        <h4 style="color: var(--primary); font-size: 16px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #e9ecef;">
          🎓 ${domaine}
        </h4>
        <div>
          ${competences.map(comp => {
            const key = `${domaine}_${comp}`;
            const checked = evals[key] || false;
            return `
              <div style="display: flex; align-items: start; margin-bottom: 10px; padding: 10px; background: ${checked ? '#d4edda' : '#f8f9fa'}; border-radius: 8px; border: 2px solid ${checked ? '#27ae60' : 'transparent'};">
                <div style="min-width: 25px; width: 25px; height: 25px; border: 3px solid ${checked ? '#27ae60' : '#8b6f47'}; border-radius: 6px; display: flex; align-items: center; justify-content: center; background: ${checked ? '#27ae60' : 'white'}; margin-right: 12px; flex-shrink: 0;">
                  ${checked ? '<span style="color: white; font-size: 16px; font-weight: bold;">✓</span>' : ''}
                </div>
                <div style="flex: 1; font-size: 14px; line-height: 1.5; color: #2c3e50; ${checked ? 'font-weight: 600;' : ''}">
                  ${comp}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  });
  
  return html;
}
</script>
