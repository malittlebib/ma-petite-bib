<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Vérification Emploi du Temps</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; }
    .btn { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
    .error { color: #e74c3c; font-weight: bold; }
    .success { color: #27ae60; font-weight: bold; }
    pre { background: #f5f5f5; padding: 15px; border-radius: 8px; overflow-x: auto; max-height: 400px; }
  </style>
</head>
<body>

<h1>🔍 Vérification Emploi du Temps</h1>

<button class="btn" onclick="verifier()">1. Vérifier emploi du temps</button>
<button class="btn" onclick="creerTest()">2. Créer activité de test</button>
<button class="btn" onclick="nettoyer()">3. Nettoyer localStorage</button>

<div id="resultat"></div>

<script>
function verifier() {
  const resultat = document.getElementById('resultat');
  let html = '<h2>📊 Vérification</h2>';
  
  // Vérifier emploi du temps
  const edtStr = localStorage.getItem('gestion_classe_emploi_du_temps');
  
  html += '<h3>Emploi du temps :</h3>';
  
  if (!edtStr) {
    html += '<p class="error">❌ AUCUN emploi du temps sauvegardé !</p>';
    html += '<p>L\'emploi du temps n\'a jamais été créé ou sauvegardé.</p>';
  } else {
    try {
      const edt = JSON.parse(edtStr);
      html += `<p class="success">✅ Trouvé : ${edt.length} activité(s)</p>`;
      
      if (edt.length === 0) {
        html += '<p class="error">⚠️ L\'emploi du temps est VIDE !</p>';
        html += '<p>Vous devez créer des activités dans Gestion de classe → Emploi du temps</p>';
      } else {
        html += '<pre>' + JSON.stringify(edt, null, 2) + '</pre>';
      }
    } catch (e) {
      html += '<p class="error">❌ ERREUR : Emploi du temps corrompu</p>';
      html += '<pre>' + e.message + '</pre>';
    }
  }
  
  // Vérifier cahiers générés
  html += '<h3>Cahiers journal générés :</h3>';
  const cahiers = Object.keys(localStorage).filter(k => k.startsWith('cahier_journal_'));
  
  if (cahiers.length === 0) {
    html += '<p>Aucun cahier journal généré</p>';
  } else {
    cahiers.forEach(key => {
      try {
        const data = JSON.parse(localStorage.getItem(key));
        html += `<p class="success">✅ ${key} : ${data.length} séances</p>`;
      } catch (e) {
        html += `<p class="error">❌ ${key} : corrompu</p>`;
      }
    });
  }
  
  resultat.innerHTML = html;
}

function creerTest() {
  const resultat = document.getElementById('resultat');
  let html = '<h2>🧪 Création activité de test</h2>';
  
  // Créer une activité de test
  const activiteTest = {
    id: Date.now().toString(),
    jour: 'lundi',
    debut: '09:00',
    fin: '10:00',
    domaine: 'Activité physique',
    sousDomaine: '',
    titre: 'Motricité TEST',
    titreAvecNiveau: '🌈 Motricité TEST',
    couleur: '#27ae60',
    lieu: 'Gymnase',
    intervenant: '',
    niveaux: ['TOUS']
  };
  
  // Récupérer l'emploi du temps existant
  let edt = [];
  try {
    const edtStr = localStorage.getItem('gestion_classe_emploi_du_temps');
    if (edtStr) {
      edt = JSON.parse(edtStr);
    }
  } catch (e) {
    html += '<p class="error">❌ Erreur lecture emploi du temps existant</p>';
  }
  
  // Ajouter l'activité test
  edt.push(activiteTest);
  
  // Sauvegarder
  try {
    localStorage.setItem('gestion_classe_emploi_du_temps', JSON.stringify(edt));
    html += `<p class="success">✅ Activité de test créée !</p>`;
    html += `<p>Nombre total d'activités : ${edt.length}</p>`;
    html += '<pre>' + JSON.stringify(activiteTest, null, 2) + '</pre>';
    html += '<p><strong>Maintenant :</strong></p>';
    html += '<ol>';
    html += '<li>Allez dans Gestion de classe → Emploi du temps</li>';
    html += '<li>Vérifiez que l\'activité "Motricité TEST" est visible</li>';
    html += '<li>Essayez de générer le cahier journal</li>';
    html += '</ol>';
  } catch (e) {
    html += '<p class="error">❌ Erreur sauvegarde : ' + e.message + '</p>';
  }
  
  resultat.innerHTML = html;
}

function nettoyer() {
  if (!confirm('⚠️ Voulez-vous vraiment nettoyer TOUS les emplois du temps et cahiers ?\n\nCela supprimera toutes vos données !')) {
    return;
  }
  
  const resultat = document.getElementById('resultat');
  let html = '<h2>🧹 Nettoyage</h2>';
  
  // Supprimer emploi du temps
  localStorage.removeItem('gestion_classe_emploi_du_temps');
  html += '<p class="success">✅ Emploi du temps supprimé</p>';
  
  // Supprimer cahiers
  const cahiers = Object.keys(localStorage).filter(k => k.startsWith('cahier_journal_'));
  cahiers.forEach(key => {
    localStorage.removeItem(key);
  });
  html += `<p class="success">✅ ${cahiers.length} cahier(s) supprimé(s)</p>`;
  
  html += '<p><strong>localStorage nettoyé !</strong></p>';
  html += '<p>Vous pouvez maintenant recommencer de zéro.</p>';
  
  resultat.innerHTML = html;
}

// Vérification automatique au chargement
window.addEventListener('load', verifier);
</script>

</body>
</html>
