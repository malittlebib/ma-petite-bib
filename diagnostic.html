<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔍 Diagnostic - Ma Petite Bib</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style-global.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e;
  color: white;
  padding: 20px;

  background: var(--bg-cream);
  background-image: radial-gradient(at 0% 0%, rgba(212, 184, 150, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(139, 111, 71, 0.08) 0px, transparent 50%);
  background-attachment: fixed;}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

h1 {
  color: #00d4ff;
  margin-bottom: 30px;
  text-align: center;
}

.section {
  background: #16213e;
  padding: 25px;
  border-radius: 15px;
  margin-bottom: 20px;
}

.section h2 {
  color: #00d4ff;
  margin-bottom: 20px;
  font-size: 1.5rem;
}

.check-list {
  display: grid;
  gap: 10px;
}

.check-item {
  background: #0f3460;
  padding: 15px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.check-item.success {
  border-left: 4px solid #27ae60;
}

.check-item.error {
  border-left: 4px solid #e74c3c;
}

.check-item.warning {
  border-left: 4px solid #f39c12;
}

.status {
  font-weight: 700;
  padding: 5px 15px;
  border-radius: 8px;
}

.status.ok {
  background: #27ae60;
}

.status.fail {
  background: #e74c3c;
}

.status.warn {
  background: #f39c12;
}

.test-btn {
  padding: 10px 20px;
  background: #00d4ff;
  color: #1a1a2e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 700;
  margin-left: 10px;
}

.test-btn:hover {
  background: #00b8e6;
}
</style>
</head>
<body>

<div class="container">
  <h1><i class="fas fa-stethoscope"></i> Diagnostic du Système</h1>

  <!-- Fichiers HTML -->
  <div class="section">
    <h2><i class="fas fa-file-code"></i> Fichiers HTML Principaux</h2>
    <div class="check-list" id="htmlFiles"></div>
  </div>

  <!-- Fichiers JavaScript -->
  <div class="section">
    <h2><i class="fas fa-code"></i> Fichiers JavaScript</h2>
    <div class="check-list" id="jsFiles"></div>
  </div>

  <!-- LocalStorage -->
  <div class="section">
    <h2><i class="fas fa-database"></i> Données LocalStorage</h2>
    <div class="check-list" id="storageData"></div>
  </div>

  <!-- Service Worker -->
  <div class="section">
    <h2><i class="fas fa-cog"></i> Service Worker & PWA</h2>
    <div class="check-list" id="pwaStatus"></div>
  </div>

  <!-- Tests de navigation -->
  <div class="section">
    <h2><i class="fas fa-link"></i> Tests de Navigation</h2>
    <div class="check-list" id="navTests"></div>
  </div>
</div>

<script>
// Liste des fichiers à vérifier
const htmlFiles = [
  'index.html',
  'tableau-de-bord.html',
  'classe-en-direct.html',
  'gestion-classe.html',
  'fiche-preparation.html',
  'fiche-preparation-ps.html',
  'fiche-preparation-ms.html',
  'fiche-preparation-gs.html',
  'cahier-journal-final-complet.html',
  'programmations.html',
  'programmations-ps.html',
  'programmations-ms.html',
  'programmations-gs.html',
  'documents-ien.html',
  'planning-annuel.html',
  'suivi-comportement.html',
  'evaluation-observations.html',
  'import-fichiers.html'
];

const jsFiles = [
  'sync-data.js',
  'pdf-exporter.js',
  'competences-data.js',
  'pwa-manager.js',
  'sw.js'
];

// Vérifier fichiers HTML
async function checkHTMLFiles() {
  const container = document.getElementById('htmlFiles');
  
  for (const file of htmlFiles) {
    const item = document.createElement('div');
    item.className = 'check-item';
    
    try {
      const response = await fetch(file, { method: 'HEAD' });
      if (response.ok) {
        item.classList.add('success');
        item.innerHTML = `
          <div>
            <i class="fas fa-check-circle" style="color: #27ae60; margin-right: 10px;"></i>
            ${file}
          </div>
          <div>
            <span class="status ok">OK</span>
            <button class="test-btn" onclick="window.open('${file}', '_blank')">Tester</button>
          </div>
        `;
      } else {
        item.classList.add('error');
        item.innerHTML = `
          <div>
            <i class="fas fa-times-circle" style="color: #e74c3c; margin-right: 10px;"></i>
            ${file}
          </div>
          <span class="status fail">Erreur ${response.status}</span>
        `;
      }
    } catch (error) {
      item.classList.add('error');
      item.innerHTML = `
        <div>
          <i class="fas fa-times-circle" style="color: #e74c3c; margin-right: 10px;"></i>
          ${file}
        </div>
        <span class="status fail">MANQUANT</span>
      `;
    }
    
    container.appendChild(item);
  }
}

// Vérifier fichiers JS
async function checkJSFiles() {
  const container = document.getElementById('jsFiles');
  
  for (const file of jsFiles) {
    const item = document.createElement('div');
    item.className = 'check-item';
    
    try {
      const response = await fetch(file, { method: 'HEAD' });
      if (response.ok) {
        item.classList.add('success');
        item.innerHTML = `
          <div>
            <i class="fas fa-check-circle" style="color: #27ae60; margin-right: 10px;"></i>
            ${file}
          </div>
          <span class="status ok">OK</span>
        `;
      } else {
        item.classList.add('error');
        item.innerHTML = `
          <div>
            <i class="fas fa-times-circle" style="color: #e74c3c; margin-right: 10px;"></i>
            ${file}
          </div>
          <span class="status fail">Erreur ${response.status}</span>
        `;
      }
    } catch (error) {
      item.classList.add('error');
      item.innerHTML = `
        <div>
          <i class="fas fa-times-circle" style="color: #e74c3c; margin-right: 10px;"></i>
          ${file}
        </div>
        <span class="status fail">MANQUANT</span>
      `;
    }
    
    container.appendChild(item);
  }
}

// Vérifier localStorage
function checkLocalStorage() {
  const container = document.getElementById('storageData');
  
  const keys = [
    'eleves',
    'niveau_classe',
    'groupes',
    'observations_eleves',
    'evaluations_eleves',
    'comportements',
    'planning_events'
  ];
  
  keys.forEach(key => {
    const item = document.createElement('div');
    item.className = 'check-item';
    
    const data = localStorage.getItem(key);
    
    if (data) {
      item.classList.add('success');
      const size = new Blob([data]).size;
      item.innerHTML = `
        <div>
          <i class="fas fa-check-circle" style="color: #27ae60; margin-right: 10px;"></i>
          ${key}
        </div>
        <span class="status ok">${(size / 1024).toFixed(2)} KB</span>
      `;
    } else {
      item.classList.add('warning');
      item.innerHTML = `
        <div>
          <i class="fas fa-exclamation-triangle" style="color: #f39c12; margin-right: 10px;"></i>
          ${key}
        </div>
        <span class="status warn">Vide</span>
      `;
    }
    
    container.appendChild(item);
  });
}

// Vérifier PWA
function checkPWA() {
  const container = document.getElementById('pwaStatus');
  
  // Service Worker
  const swItem = document.createElement('div');
  swItem.className = 'check-item';
  
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistration().then(reg => {
      if (reg) {
        swItem.classList.add('success');
        swItem.innerHTML = `
          <div>
            <i class="fas fa-check-circle" style="color: #27ae60; margin-right: 10px;"></i>
            Service Worker
          </div>
          <span class="status ok">Actif</span>
        `;
      } else {
        swItem.classList.add('warning');
        swItem.innerHTML = `
          <div>
            <i class="fas fa-exclamation-triangle" style="color: #f39c12; margin-right: 10px;"></i>
            Service Worker
          </div>
          <span class="status warn">Non enregistré</span>
        `;
      }
      container.appendChild(swItem);
    });
  } else {
    swItem.classList.add('error');
    swItem.innerHTML = `
      <div>
        <i class="fas fa-times-circle" style="color: #e74c3c; margin-right: 10px;"></i>
        Service Worker
      </div>
      <span class="status fail">Non supporté</span>
    `;
    container.appendChild(swItem);
  }
  
  // Mode standalone
  const standaloneItem = document.createElement('div');
  standaloneItem.className = 'check-item';
  
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  
  if (isStandalone) {
    standaloneItem.classList.add('success');
    standaloneItem.innerHTML = `
      <div>
        <i class="fas fa-check-circle" style="color: #27ae60; margin-right: 10px;"></i>
        Mode Standalone
      </div>
      <span class="status ok">Installé</span>
    `;
  } else {
    standaloneItem.classList.add('warning');
    standaloneItem.innerHTML = `
      <div>
        <i class="fas fa-exclamation-triangle" style="color: #f39c12; margin-right: 10px;"></i>
        Mode Standalone
      </div>
      <span class="status warn">Non installé</span>
    `;
  }
  container.appendChild(standaloneItem);
  
  // Connexion
  const onlineItem = document.createElement('div');
  onlineItem.className = 'check-item';
  
  if (navigator.onLine) {
    onlineItem.classList.add('success');
    onlineItem.innerHTML = `
      <div>
        <i class="fas fa-wifi" style="color: #27ae60; margin-right: 10px;"></i>
        Connexion
      </div>
      <span class="status ok">En ligne</span>
    `;
  } else {
    onlineItem.classList.add('warning');
    onlineItem.innerHTML = `
      <div>
        <i class="fas fa-wifi-slash" style="color: #f39c12; margin-right: 10px;"></i>
        Connexion
      </div>
      <span class="status warn">Hors-ligne</span>
    `;
  }
  container.appendChild(onlineItem);
}

// Tests de navigation
function checkNavigation() {
  const container = document.getElementById('navTests');
  
  const tests = [
    { name: 'SyncData disponible', test: () => typeof window.SyncData !== 'undefined' },
    { name: 'PDFExporter disponible', test: () => typeof window.PDFExporter !== 'undefined' },
    { name: 'PWAManager disponible', test: () => typeof window.PWAManager !== 'undefined' },
    { name: 'Font Awesome chargé', test: () => document.querySelector('link[href*="font-awesome"]') !== null }
  ];
  
  tests.forEach(({ name, test }) => {
    const item = document.createElement('div');
    item.className = 'check-item';
    
    try {
      const result = test();
      if (result) {
        item.classList.add('success');
        item.innerHTML = `
          <div>
            <i class="fas fa-check-circle" style="color: #27ae60; margin-right: 10px;"></i>
            ${name}
          </div>
          <span class="status ok">OK</span>
        `;
      } else {
        item.classList.add('error');
        item.innerHTML = `
          <div>
            <i class="fas fa-times-circle" style="color: #e74c3c; margin-right: 10px;"></i>
            ${name}
          </div>
          <span class="status fail">ÉCHEC</span>
        `;
      }
    } catch (error) {
      item.classList.add('error');
      item.innerHTML = `
        <div>
          <i class="fas fa-times-circle" style="color: #e74c3c; margin-right: 10px;"></i>
          ${name}
        </div>
        <span class="status fail">ERREUR</span>
      `;
    }
    
    container.appendChild(item);
  });
}

// Lancer tous les tests
document.addEventListener('DOMContentLoaded', async () => {
  await checkHTMLFiles();
  await checkJSFiles();
  checkLocalStorage();
  checkPWA();
  checkNavigation();
});
</script>

</body>
</html>
