<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documents Administratifs – Ma Petite Bib</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* ══════════════════════════════════════════════════
       SYSTÈME DE THÈMES - Rose Planner vs Beige Classic
       ══════════════════════════════════════════════════ */
    
    /* Thème par défaut : Rose Planner */
    :root {
      --rose-deep:    #b57c84;
      --rose-mid:     #c9909a;
      --rose-light:   #e8b4bc;
      --rose-pale:    #f5dde0;
      --rose-blush:   #fdf0f1;
      --terracotta:   #996055;
      --brown-dark:   #745252;
      --cream:        #fffaf6;
      --cream-dark:   #f5ede6;
      --gold:         #dda83f;
      --gold-light:   #f0d080;
      --forest:       #2b4743;
      --forest-light: #3d6b63;
      --text-dark:    #3a2a2a;
      --text-mid:     #6b4848;
      --text-light:   #a07070;
      --white:        #ffffff;
      --success:      #27ae60;
      --danger:       #e74c3c;
    }

    /* Thème alternatif : Beige Classic */
    [data-theme="beige"] {
      --rose-deep:    #8b6f47;
      --rose-mid:     #a68a5e;
      --rose-light:   #d4b896;
      --rose-pale:    #e8dfd3;
      --rose-blush:   #f5f1eb;
      --terracotta:   #8b6f47;
      --brown-dark:   #6b5435;
      --cream:        #faf8f5;
      --cream-dark:   #f5ede6;
      --gold:         #d4a574;
      --gold-light:   #e8c9a0;
      --forest:       #2b4743;
      --forest-light: #3d6b63;
      --text-dark:    #2d2520;
      --text-mid:     #6b5d52;
      --text-light:   #9b8d7e;
      --white:        #ffffff;
      --success:      #27ae60;
      --danger:       #e74c3c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* Navigation */
    .nav-wrapper {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: var(--white);
      border-bottom: 1.5px solid var(--rose-pale);
      box-shadow: 0 2px 20px rgba(181,124,132,0.10);
    }

    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .nav-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-style: italic;
      color: var(--brown-dark);
      letter-spacing: 0.02em;
      text-decoration: none;
    }

    .nav-brand span {
      color: var(--rose-deep);
    }

    .nav-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1.5px solid var(--rose-light);
      background: var(--white);
      color: var(--rose-deep);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .nav-btn:hover {
      background: var(--rose-deep);
      color: var(--white);
      border-color: var(--rose-deep);
    }

    /* Container */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 100px 28px 60px;
    }

    /* Header */
    .page-header {
      margin-bottom: 40px;
    }

    .page-eyebrow {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--rose-mid);
      margin-bottom: 12px;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--brown-dark);
      margin-bottom: 12px;
    }

    .page-title em {
      font-style: italic;
      color: var(--rose-deep);
    }

    .page-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      color: var(--text-mid);
      font-style: italic;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 30px;
      border-bottom: 1.5px solid var(--rose-pale);
      padding-bottom: 0;
    }

    .tab {
      padding: 12px 24px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-mid);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab:hover {
      color: var(--rose-deep);
      background: var(--rose-blush);
    }

    .tab.active {
      color: var(--rose-deep);
      border-bottom-color: var(--rose-deep);
      background: var(--rose-blush);
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--white);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(181,124,132,0.12);
      box-shadow: 0 2px 12px rgba(181,124,132,0.08);
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--rose-deep);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-mid);
    }

    .stat-progress {
      margin-top: 8px;
      height: 6px;
      background: var(--rose-pale);
      border-radius: 3px;
      overflow: hidden;
    }

    .stat-progress-bar {
      height: 100%;
      background: var(--rose-deep);
      transition: width 0.3s;
    }

    /* View Selector */
    .view-selector {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-bottom: 20px;
    }

    .view-btn {
      padding: 8px 16px;
      border: 1.5px solid var(--rose-light);
      background: var(--white);
      color: var(--rose-deep);
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .view-btn:hover, .view-btn.active {
      background: var(--rose-deep);
      color: var(--white);
      border-color: var(--rose-deep);
    }

    /* Content */
    .content-view {
      display: none;
    }

    .content-view.active {
      display: block;
    }

    /* Vue globale */
    .doc-type-card {
      background: var(--white);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
      border: 1px solid rgba(181,124,132,0.12);
      box-shadow: 0 2px 12px rgba(181,124,132,0.08);
    }

    .doc-type-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .doc-type-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--brown-dark);
    }

    .doc-type-stats {
      font-size: 0.9rem;
      color: var(--text-mid);
    }

    .doc-type-progress {
      height: 8px;
      background: var(--rose-pale);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .doc-type-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--rose-deep), var(--rose-mid));
      transition: width 0.3s;
    }

    .doc-type-percentage {
      font-size: 0.8rem;
      color: var(--text-light);
      text-align: right;
    }

    /* Vue par élève */
    .student-card {
      background: var(--white);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid rgba(181,124,132,0.12);
      box-shadow: 0 2px 12px rgba(181,124,132,0.08);
    }

    .student-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1.5px solid var(--rose-pale);
    }

    .student-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--brown-dark);
    }

    .student-completion {
      font-size: 0.9rem;
      color: var(--text-mid);
    }

    .docs-list {
      display: grid;
      gap: 12px;
    }

    .doc-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: var(--cream);
      border-radius: 8px;
      transition: all 0.2s;
      cursor: pointer;
      border: 1.5px solid transparent;
    }

    .doc-item:hover {
      background: var(--rose-blush);
      border-color: var(--rose-light);
    }

    .doc-item-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .doc-checkbox {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 2px solid var(--rose-light);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .doc-checkbox.checked {
      background: var(--success);
      border-color: var(--success);
      color: var(--white);
    }

    .doc-checkbox.unchecked {
      background: var(--white);
    }

    .doc-name {
      font-size: 0.9rem;
      color: var(--text-dark);
      font-weight: 500;
    }

    .doc-date {
      font-size: 0.8rem;
      color: var(--text-light);
      font-style: italic;
    }

    .doc-date.received {
      color: var(--success);
    }

    .doc-date.missing {
      color: var(--danger);
    }

    /* Bouton export */
    .export-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--rose-deep);
      color: var(--white);
      border: none;
      box-shadow: 0 4px 20px rgba(181,124,132,0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.3s;
    }

    .export-btn:hover {
      background: var(--brown-dark);
      transform: scale(1.1);
    }

    @media print {
      .nav-wrapper, .tabs, .view-selector, .export-btn {
        display: none !important;
      }
      
      .container {
        padding-top: 20px;
      }
    }
  </style>
</head>
<body>

<!-- Navigation -->
<nav class="nav-wrapper">
  <div class="nav-inner">
    <a href="index-planner.html" class="nav-brand">
      Ma Petite <span>Bib</span>
    </a>
    <a href="index-planner.html" class="nav-btn">
      <i class="fas fa-home"></i> Accueil
    </a>
  </div>
</nav>

<!-- Container -->
<div class="container">
  
  <!-- Header -->
  <div class="page-header">
    <div class="page-eyebrow">Administration</div>
    <h1 class="page-title">Documents <em>Administratifs</em></h1>
    <p class="page-subtitle">Suivi des documents obligatoires et autorisations</p>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <!-- Généré dynamiquement -->
  </div>

  <!-- View Selector -->
  <div class="view-selector">
    <button class="view-btn active" onclick="changerVue('globale')">
      <i class="fas fa-chart-bar"></i> Vue globale
    </button>
    <button class="view-btn" onclick="changerVue('eleves')">
      <i class="fas fa-users"></i> Par élève
    </button>
  </div>

  <!-- Vue Globale -->
  <div class="content-view active" id="vueGlobale">
    <div id="docsGlobaleContent">
      <!-- Généré dynamiquement -->
    </div>
  </div>

  <!-- Vue Par Élève -->
  <div class="content-view" id="vueEleves">
    <div id="studentsContent">
      <!-- Généré dynamiquement -->
    </div>
  </div>

</div>

<!-- Export Button -->
<button class="export-btn" onclick="exporterPDF()" title="Exporter en PDF">
  <i class="fas fa-file-pdf"></i>
</button>

<script>
// Charger le thème
function chargerTheme() {
  const savedTheme = localStorage.getItem('app_theme') || 'rose';
  if (savedTheme === 'beige') {
    document.documentElement.setAttribute('data-theme', 'beige');
  }
}
chargerTheme();

// Types de documents
const TYPES_DOCUMENTS = [
  { id: 'fiche_renseignements', nom: 'Fiche de renseignements', obligatoire: true },
  { id: 'autorisation_parentale', nom: 'Autorisation parentale', obligatoire: true },
  { id: 'certificat_medical', nom: 'Certificat médical', obligatoire: false },
  { id: 'droit_image', nom: 'Autorisation droit à l\'image', obligatoire: true },
  { id: 'pai', nom: 'PAI (Projet d\'Accueil Individualisé)', obligatoire: false },
  { id: 'ppre', nom: 'PPRE (Programme Personnalisé)', obligatoire: false },
  { id: 'bilan_periode', nom: 'Bilan de période', obligatoire: false },
  { id: 'livret_scolaire', nom: 'Livret scolaire', obligatoire: false },
  { id: 'cr_reunion', nom: 'Compte-rendu réunion parents', obligatoire: false },
  { id: 'doc_ien', nom: 'Documents IEN', obligatoire: false }
];

let documentsData = {};
let eleves = [];

// Initialisation
document.addEventListener('DOMContentLoaded', function() {
  chargerEleves();
  chargerDocuments();
  afficherStats();
  afficherVueGlobale();
  afficherVueEleves();
});

function chargerEleves() {
  try {
    const data = localStorage.getItem('eleves');
    eleves = data ? JSON.parse(data) : [];
    
    if (eleves.length === 0) {
      // Créer des élèves de démonstration
      eleves = [
        { id: '1', prenom: 'Marie', nom: 'DUPONT', niveau: 'GS' },
        { id: '2', prenom: 'Lucas', nom: 'MARTIN', niveau: 'MS' },
        { id: '3', prenom: 'Emma', nom: 'BERNARD', niveau: 'GS' }
      ];
    }
  } catch (e) {
    console.error('Erreur chargement élèves:', e);
    eleves = [];
  }
}

function chargerDocuments() {
  try {
    const data = localStorage.getItem('documents_administratifs');
    documentsData = data ? JSON.parse(data) : {};
    
    // Initialiser la structure pour chaque élève
    eleves.forEach(eleve => {
      if (!documentsData[eleve.id]) {
        documentsData[eleve.id] = {};
        TYPES_DOCUMENTS.forEach(type => {
          documentsData[eleve.id][type.id] = {
            recu: false,
            date: null
          };
        });
      }
    });
  } catch (e) {
    console.error('Erreur chargement documents:', e);
    documentsData = {};
  }
}

function sauvegarderDocuments() {
  try {
    localStorage.setItem('documents_administratifs', JSON.stringify(documentsData));
  } catch (e) {
    console.error('Erreur sauvegarde:', e);
  }
}

function toggleDocument(eleveId, docId) {
  if (!documentsData[eleveId]) return;
  
  const doc = documentsData[eleveId][docId];
  doc.recu = !doc.recu;
  doc.date = doc.recu ? new Date().toISOString().split('T')[0] : null;
  
  sauvegarderDocuments();
  afficherStats();
  afficherVueGlobale();
  afficherVueEleves();
}

function afficherStats() {
  const statsGrid = document.getElementById('statsGrid');
  
  let totalDocs = 0;
  let docsRecus = 0;
  let docsManquants = 0;
  
  eleves.forEach(eleve => {
    TYPES_DOCUMENTS.forEach(type => {
      totalDocs++;
      const doc = documentsData[eleve.id]?.[type.id];
      if (doc && doc.recu) {
        docsRecus++;
      } else {
        docsManquants++;
      }
    });
  });
  
  const pourcentage = totalDocs > 0 ? Math.round((docsRecus / totalDocs) * 100) : 0;
  
  statsGrid.innerHTML = `
    <div class="stat-card">
      <div class="stat-value">${eleves.length}</div>
      <div class="stat-label">Élèves</div>
    </div>
    
    <div class="stat-card">
      <div class="stat-value">${TYPES_DOCUMENTS.length}</div>
      <div class="stat-label">Types de documents</div>
    </div>
    
    <div class="stat-card">
      <div class="stat-value">${docsRecus}</div>
      <div class="stat-label">Documents reçus</div>
      <div class="stat-progress">
        <div class="stat-progress-bar" style="width: ${pourcentage}%"></div>
      </div>
    </div>
    
    <div class="stat-card">
      <div class="stat-value">${docsManquants}</div>
      <div class="stat-label">Documents manquants</div>
    </div>
  `;
}

function afficherVueGlobale() {
  const content = document.getElementById('docsGlobaleContent');
  
  let html = '';
  
  TYPES_DOCUMENTS.forEach(type => {
    let recus = 0;
    let total = eleves.length;
    
    eleves.forEach(eleve => {
      const doc = documentsData[eleve.id]?.[type.id];
      if (doc && doc.recu) recus++;
    });
    
    const pourcentage = total > 0 ? Math.round((recus / total) * 100) : 0;
    
    html += `
      <div class="doc-type-card">
        <div class="doc-type-header">
          <div class="doc-type-name">
            ${type.obligatoire ? '<i class="fas fa-star" style="color: var(--gold); font-size: 0.8rem;"></i> ' : ''}
            ${type.nom}
          </div>
          <div class="doc-type-stats">${recus} / ${total}</div>
        </div>
        <div class="doc-type-progress">
          <div class="doc-type-progress-bar" style="width: ${pourcentage}%"></div>
        </div>
        <div class="doc-type-percentage">${pourcentage}% complété</div>
      </div>
    `;
  });
  
  content.innerHTML = html;
}

function afficherVueEleves() {
  const content = document.getElementById('studentsContent');
  
  let html = '';
  
  eleves.forEach(eleve => {
    let docsRecus = 0;
    let totalDocs = TYPES_DOCUMENTS.length;
    
    TYPES_DOCUMENTS.forEach(type => {
      const doc = documentsData[eleve.id]?.[type.id];
      if (doc && doc.recu) docsRecus++;
    });
    
    html += `
      <div class="student-card">
        <div class="student-header">
          <div class="student-name">${eleve.prenom} ${eleve.nom}</div>
          <div class="student-completion">${docsRecus} / ${totalDocs} documents</div>
        </div>
        <div class="docs-list">
    `;
    
    TYPES_DOCUMENTS.forEach(type => {
      const doc = documentsData[eleve.id]?.[type.id];
      const recu = doc && doc.recu;
      const date = doc && doc.date;
      
      html += `
        <div class="doc-item" onclick="toggleDocument('${eleve.id}', '${type.id}')">
          <div class="doc-item-left">
            <div class="doc-checkbox ${recu ? 'checked' : 'unchecked'}">
              ${recu ? '<i class="fas fa-check"></i>' : ''}
            </div>
            <span class="doc-name">${type.nom}</span>
          </div>
          <div class="doc-date ${recu ? 'received' : 'missing'}">
            ${recu ? 'Reçu le ' + formatDate(date) : 'Non reçu'}
          </div>
        </div>
      `;
    });
    
    html += `
        </div>
      </div>
    `;
  });
  
  content.innerHTML = html;
}

function changerVue(vue) {
  // Update buttons
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.closest('.view-btn').classList.add('active');
  
  // Update views
  document.querySelectorAll('.content-view').forEach(view => {
    view.classList.remove('active');
  });
  
  if (vue === 'globale') {
    document.getElementById('vueGlobale').classList.add('active');
  } else {
    document.getElementById('vueEleves').classList.add('active');
  }
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  return `${d}/${m}/${y}`;
}

function exporterPDF() {
  alert('📄 Export PDF en cours de développement...\n\nPour l\'instant, utilisez Ctrl+P (Cmd+P sur Mac) pour imprimer.');
  window.print();
}

console.log('✅ Documents administratifs chargés');
</script>

</body>
</html>
