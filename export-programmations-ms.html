<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Export Programmations MS - Pour l'IEN</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Arial', 'Helvetica', sans-serif;
  background: #f5f7fa;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* INTERFACE DE CONFIGURATION */
.config-panel {
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  margin-bottom: 30px;
}

.config-panel h1 {
  color: #FFD93D;
  margin-bottom: 10px;
  font-size: 1.8rem;
}

.config-panel p {
  color: #7f8c8d;
  margin-bottom: 25px;
}

.form-section {
  margin-bottom: 25px;
}

.form-section label {
  display: block;
  font-weight: 600;
  margin-bottom: 10px;
  color: #2c3e50;
}

.form-section input,
.form-section select {
  width: 100%;
  padding: 12px;
  border: 2px solid #e9ecef;
  border-radius: 8px;
  font-size: 1rem;
  font-family: inherit;
}

.checkbox-group {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
}

.checkbox-item {
  background: #f8f9fa;
  padding: 12px 18px;
  border-radius: 8px;
  border: 2px solid #e9ecef;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.checkbox-item:hover {
  border-color: #FFD93D;
  background: #FFF9F0;
}

.checkbox-item input[type="checkbox"] {
  width: auto;
  cursor: pointer;
}

.checkbox-item.checked {
  border-color: #FFD93D;
  background: #FFF9F0;
}

.btn-group {
  display: flex;
  gap: 15px;
  margin-top: 30px;
}

.btn {
  padding: 15px 30px;
  border: none;
  border-radius: 10px;
  font-family: inherit;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 10px;
}

.btn-primary {
  background: linear-gradient(135deg, #FFD93D 0%, #FFA500 100%);
  color: white;
  flex: 1;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(255, 165, 0, 0.3);
}

.btn-secondary {
  background: #7f8c8d;
  color: white;
}

/* PREVIEW / PRINT */
.print-preview {
  display: none;
  background: white;
}

/* STYLES D'IMPRESSION */
@media print {
  body { background: white; padding: 0; margin: 0; }
  .config-panel, .btn-group, .no-print { display: none !important; }
  .print-preview { display: block !important; }
  .page { page-break-after: always; padding: 0.5cm 1cm !important; }
  .page:last-child { page-break-after: auto; }
  h1, h2, h3 { page-break-after: avoid; }
  .document-header h1 { font-size: 16pt !important; margin-bottom: 5px !important; }
  .document-header h2 { font-size: 13pt !important; margin-bottom: 8px !important; }
  .document-header .meta p { font-size: 9pt !important; margin: 2px 0 !important; }
  .document-header { padding: 10px 0 !important; margin-bottom: 15px !important; }
  .periode-section { margin-bottom: 15px !important; }
  .periode-title { font-size: 13pt !important; padding: 6px 10px !important; margin-bottom: 10px !important; }
  .domaine-section { margin-bottom: 12px !important; }
  .domaine-title { font-size: 11pt !important; padding-bottom: 4px !important; margin-bottom: 8px !important; }
  .competence-block { page-break-inside: avoid; margin-bottom: 8px !important; padding: 8px 10px !important; }
  .competence-title { font-size: 10pt !important; margin-bottom: 6px !important; }
  .progression-detail { margin-top: 5px !important; padding-left: 10px !important; }
  .semaine-item { margin-bottom: 6px !important; padding: 5px 8px !important; }
  .semaine-item h4 { font-size: 9pt !important; margin-bottom: 3px !important; }
  .semaine-item p { font-size: 8pt !important; line-height: 1.3 !important; }
  .footer-page { padding-top: 8px !important; margin-top: 15px !important; font-size: 8pt !important; }
  @page { size: A4 portrait; margin: 1cm; }
}

/* MISE EN PAGE DOCUMENT */
.document-header {
  text-align: center;
  padding: 30px 0;
  border-bottom: 3px solid #FFD93D;
  margin-bottom: 30px;
}

.document-header h1 {
  font-size: 2rem;
  color: #2c3e50;
  margin-bottom: 10px;
}

.document-header .meta {
  color: #7f8c8d;
  font-size: 0.95rem;
  line-height: 1.8;
}

.periode-section {
  margin-bottom: 40px;
}

.periode-title {
  background: linear-gradient(135deg, #FFD93D 0%, #FFA500 100%);
  color: white;
  padding: 15px 20px;
  border-radius: 10px;
  margin-bottom: 25px;
  font-size: 1.5rem;
}

.domaine-section {
  margin-bottom: 30px;
}

.domaine-title {
  color: #FFA500;
  font-size: 1.3rem;
  border-bottom: 2px solid #FFD93D;
  padding-bottom: 10px;
  margin-bottom: 20px;
}

.competence-block {
  margin-bottom: 25px;
  padding: 20px;
  background: #f8f9fa;
  border-left: 4px solid #FFD93D;
  border-radius: 8px;
}

.competence-title {
  font-weight: 700;
  color: #2c3e50;
  margin-bottom: 15px;
  font-size: 1.05rem;
}

.progression-detail {
  margin-top: 15px;
  padding-left: 20px;
}

.semaine-item {
  margin-bottom: 15px;
  padding: 12px;
  background: white;
  border-radius: 6px;
  border-left: 3px solid #27ae60;
}

.semaine-item h4 {
  color: #27ae60;
  font-size: 0.95rem;
  margin-bottom: 8px;
}

.semaine-item p {
  color: #555;
  line-height: 1.6;
  font-size: 0.9rem;
  white-space: pre-wrap;
}

.footer-page {
  text-align: center;
  padding-top: 20px;
  border-top: 1px solid #e9ecef;
  color: #95a5a6;
  font-size: 0.85rem;
  margin-top: 40px;
}
</style>
</head>
<body>

<div class="container">
  
  <!-- PANNEAU DE CONFIGURATION -->
  <div class="config-panel no-print">
    <h1>📄 Export Programmations - Moyenne Section</h1>
    <p>Préparez un document professionnel pour l'IEN avec vos programmations et progressions détaillées</p>
    
    <!-- Informations établissement -->
    <div class="form-section">
      <label>🏫 École</label>
      <input type="text" id="nomEcole" placeholder="Ex: École Marie Curie">
    </div>
    
    <div class="form-section">
      <label>👤 Enseignant(e)</label>
      <input type="text" id="nomEnseignant" placeholder="Ex: Mme Dupont">
    </div>
    
    <div class="form-section">
      <label>📅 Année scolaire</label>
      <input type="text" id="anneeScolaire" value="2025-2026">
    </div>
    
    <!-- Sélection des périodes -->
    <div class="form-section">
      <label>📋 Périodes à inclure</label>
      <div class="checkbox-group">
        <label class="checkbox-item">
          <input type="checkbox" value="P1" checked onchange="updateCheckbox(this)">
          <span>Période 1</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" value="P2" checked onchange="updateCheckbox(this)">
          <span>Période 2</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" value="P3" checked onchange="updateCheckbox(this)">
          <span>Période 3</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" value="P4" checked onchange="updateCheckbox(this)">
          <span>Période 4</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" value="P5" checked onchange="updateCheckbox(this)">
          <span>Période 5</span>
        </label>
      </div>
    </div>
    
    <!-- Options d'affichage -->
    <div class="form-section">
      <label>📝 Format du document</label>
      <div class="checkbox-group">
        <label class="checkbox-item checked">
          <input type="checkbox" id="inclureProgressions" checked onchange="updateCheckbox(this)">
          <span>Inclure les progressions détaillées (recommandé pour l'IEN)</span>
        </label>
      </div>
    </div>
    
    <!-- Boutons d'action -->
    <div class="btn-group">
      <button class="btn btn-secondary" onclick="window.location.href='programmations-ms.html'">
        <i class="fas fa-arrow-left"></i> Retour
      </button>
      <button class="btn btn-primary" onclick="genererDocument()">
        <i class="fas fa-file-pdf"></i> Générer et imprimer
      </button>
    </div>
  </div>
  
  <!-- DOCUMENT À IMPRIMER -->
  <div class="print-preview" id="documentPreview"></div>

</div>

<script>
function updateCheckbox(checkbox) {
  checkbox.closest('.checkbox-item').classList.toggle('checked', checkbox.checked);
}

function genererDocument() {
  console.log('🔍 Début génération document MS');
  
  const nomEcole = document.getElementById('nomEcole').value || 'École [À compléter]';
  const nomEnseignant = document.getElementById('nomEnseignant').value || 'Enseignant(e) [À compléter]';
  const anneeScolaire = document.getElementById('anneeScolaire').value;
  const inclureProgressions = document.getElementById('inclureProgressions').checked;
  
  console.log('📝 Infos:', { nomEcole, nomEnseignant, anneeScolaire, inclureProgressions });
  
  // Récupérer les périodes sélectionnées
  const periodesSelectionnees = [];
  document.querySelectorAll('.checkbox-group input[type="checkbox"]:checked').forEach(cb => {
    if (cb.value && cb.value.startsWith('P')) {
      periodesSelectionnees.push(cb.value);
    }
  });
  
  console.log('✅ Périodes sélectionnées:', periodesSelectionnees);
  
  if (periodesSelectionnees.length === 0) {
    alert('⚠️ Veuillez sélectionner au moins une période');
    return;
  }
  
  // Masquer le panneau de configuration
  const configPanel = document.querySelector('.config-panel');
  if (configPanel) {
    configPanel.style.display = 'none';
    console.log('✅ Panneau masqué');
  } else {
    console.error('❌ Panneau config non trouvé');
  }
  
  // Charger les progressions
  const progressions = JSON.parse(localStorage.getItem('progressions_ms') || '{}');
  console.log('📚 Progressions chargées:', Object.keys(progressions).length, 'clés');
  
  // Générer le document avec logo et copyright
  let html = `
    <div class="page">
      <!-- Logo et titre -->
      <div style="text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 3px solid #FFD93D;">
        <img src="logo.png" alt="Ma Petite Bib" style="height: 50px; margin-bottom: 15px;">
        <div style="font-size: 14pt; font-weight: bold; color: #8b6f47; margin-bottom: 5px;">Ma Petite Bib</div>
      </div>
      
      <div class="document-header">
        <h1>PROGRAMMATIONS ET PROGRESSIONS</h1>
        <h2>Moyenne Section - Cycle 1</h2>
        <div class="meta">
          <p><strong>${nomEcole}</strong></p>
          <p>${nomEnseignant}</p>
          <p>Année scolaire ${anneeScolaire}</p>
        </div>
      </div>
  `;
  
  console.log('🎨 HTML de base créé');
  
  // Structure des programmations par période
  const programmations = {
    'P1': {
      titre: 'Période 1 - Septembre/Octobre',
      domaines: {
        'Mathématiques': [
          'Réaliser une collection de 1 à 2 objets (modèle avec objets différents)',
          'Utiliser le principe de cardinalité (jusqu\'à 2)',
          'Comparer globalement : plus que, moins que',
          'Composer et décomposer avec les doigts',
          'Nommer le nombre correspondant à une quantité (2)',
          'Reconnaître visuellement et tactilement des formes',
        ],
        'Langage oral': [
          'Enrichir son vocabulaire : jeux et jouets, école et automne',
          'Trouver un intrus parmi des mots',
          'Utiliser le pronom "tu"',
          'Utiliser le verbe à l\'imparfait',
          'Coordonner avec "d\'abord"',
          'Réciter comptines et chansons',
        ],
        'Découvrir l\'écrit': [
          'Discriminer les voyelles a, i, o',
          'Repérer et imiter des variations d\'intensité',
          'Scander les syllabes avec le langage robot',
          'Épeler son prénom',
          'Composer un mot avec lettres mobiles majuscules',
        ],
        'Graphisme et écriture': [
          'Tracer des lignes verticales',
          'Contrôler son geste (freiner, reprendre)',
          'Copier son prénom en capitales avec modèle',
        ],
        'Activité physique': [
          'Découvrir différents objets (ballons, cerceaux, cordes, sacs)',
          'Expérimenter différents modes de déplacement',
          'Connaître et exécuter différentes positions',
        ],
        'Activités artistiques': [
          'Dessiner différents éléments identifiables',
          'Réaliser des compositions plastiques',
          'Mémoriser et interpréter comptines et chansons',
        ],
        'Explorer le monde': [
          'Se repérer dans la journée (matin, midi, après-midi)',
          'Utiliser locutions spatiales (sur/sous, dedans/dehors)',
          'Observer le monde animal et végétal',
        ],
      }
    },
    'P2': {
      titre: 'Période 2 - Novembre/Décembre',
      domaines: {
        'Mathématiques': [
          'Réaliser une collection de 1 à 3 objets',
          'Utiliser le principe de cardinalité (jusqu\'à 3)',
          'Comparer par correspondance terme à terme',
          'Verbaliser les compositions et décompositions (2 et 3)',
          'Faire correspondance nombre/écriture chiffrée (3)',
          'Repérer visuellement le rang (max 3)',
        ],
        'Langage oral': [
          'Enrichir son vocabulaire : météo, sorcières et Noël',
          'Trouver des mots polysémiques (feuille, mousse)',
          'Coordonner avec "ensuite"',
          'Articuler distinctement s/z',
          'Expliquer les ateliers faits ou à faire',
        ],
        'Découvrir l\'écrit': [
          'Discriminer les voyelles u, e, é',
          'Scander et frapper les syllabes',
          'Dénombrer les syllabes',
          'Repérer lettres identiques dans des mots',
        ],
        'Graphisme et écriture': [
          'Tracer des lignes horizontales et quadrillage',
          'Copier son prénom en capitales',
          'Copier des mots de la classe',
        ],
        'Activité physique': [
          'Reproduire un mode de déplacement',
          'Sauter (loin, haut, par-dessus)',
          'Faire des rondes et jeux dansés',
        ],
        'Activités artistiques': [
          'Réaliser des tracés continus (verticales, horizontales)',
          'Travailler la couleur (mélanges, nuances)',
          'Explorer les sonorités du corps et instruments',
        ],
        'Explorer le monde': [
          'Dire ce qu\'on a fait avant et après une activité',
          'Décrire des positions dans l\'espace',
          'Explorer et agir sur la matière (pâte, papier, eau)',
        ],
      }
    },
    'P3': {
      titre: 'Période 3 - Janvier/Février',
      domaines: {
        'Mathématiques': [
          'Réaliser une collection de 1 à 4 objets',
          'Utiliser doigts, dé ou nom du nombre (1 à 6)',
          'Comparer les collections en dénombrant',
          'Verbaliser compositions et décompositions (2 à 4)',
          'Faire correspondance nombre/écriture (4)',
          'Repérer en comptant le rang (1er au 4ème)',
          'Placer un objet dans une case sur la bande numérique',
        ],
        'Langage oral': [
          'Enrichir son vocabulaire : animaux du zoo, roi/château/hiver',
          'Trouver des mots polysémiques (jumelles, souris)',
          'Utiliser le pronom "on"',
          'Utiliser le verbe au passé-composé',
          'Coordonner avec "après"',
          'Articuler distinctement p/b',
        ],
        'Découvrir l\'écrit': [
          'Discriminer les sons s, m, f, r, l',
          'Manipuler les syllabes (ajouter, supprimer, fusionner)',
          'Repérer correspondances entre graphies',
          'Écouter et établir la chronologie d\'une histoire',
        ],
        'Graphisme et écriture': [
          'Tracer des lignes obliques et lignes brisées',
          'Écrire son prénom en capitales sans modèle',
          'Écrire des mots connus avec modèle',
        ],
        'Activité physique': [
          'Ramper (ventre, dos, avec/sans bras)',
          'Utiliser tricycles, vélos, draisiennes',
          'Respecter les règles de jeux collectifs',
        ],
        'Activités artistiques': [
          'Réaliser des cercles fermés',
          'Observer et décrire des œuvres d\'art',
          'Repérer et reproduire des formules rythmiques simples',
        ],
        'Explorer le monde': [
          'Se repérer dans la semaine (jour, semaine)',
          'Se repérer dans une page (haut, bas, gauche, droite)',
          'Distinguer les parties du corps',
        ],
      }
    },
    'P4': {
      titre: 'Période 4 - Mars/Avril',
      domaines: {
        'Mathématiques': [
          'Réaliser des collections avec représentation analogique (1 à 5)',
          'Comparer par correspondance terme à terme',
          'Verbaliser compositions et décompositions (2 à 5)',
          'Faire correspondance nombre/écriture (5)',
          'Repérer en comptant le rang (1er au 5ème)',
          'Remettre des étiquettes chiffres dans l\'ordre',
        ],
        'Langage oral': [
          'Enrichir son vocabulaire : contes, printemps',
          'Trouver des mots polysémiques (couette, tableau)',
          'Coordonner avec "pendant"',
          'Articuler distinctement t/d',
          'Expliquer comment on a fait ou va faire',
        ],
        'Découvrir l\'écrit': [
          'Discriminer les sons v, j, n, z, p, b, c, t',
          'Identifier syllabe d\'attaque ou finale',
          'Manipuler les syllabes (substituer)',
          'Composer un mot avec lettres mobiles (majuscules et scriptes)',
          'Reformuler une histoire racontée',
        ],
        'Graphisme et écriture': [
          'Tracer des cercles fermés',
          'Mémoriser le tracé des lettres capitales et chiffres',
          'S\'entraîner aux graphismes',
        ],
        'Activité physique': [
          'Adapter ses déplacements à des contraintes variées',
          'Danser seul, à deux, avec du matériel',
          'Comprendre deux rôles différents dans un jeu d\'opposition',
        ],
        'Activités artistiques': [
          'Dessiner pour inventer, illustrer une histoire',
          'Exprimer son avis face à une image',
          'Jouer avec sa voix (timbre, intensité, hauteur)',
        ],
        'Explorer le monde': [
          'Utiliser hier, aujourd\'hui, demain',
          'Suivre, décrire et représenter un parcours',
          'Utiliser des ustensiles et les ciseaux',
        ],
      }
    },
    'P5': {
      titre: 'Période 5 - Mai/Juin',
      domaines: {
        'Mathématiques': [
          'Réaliser des collections (cardinalité par nom du nombre, 1 à 6)',
          'Comparer en dénombrant chaque collection',
          'Verbaliser compositions et décompositions (2 à 6)',
          'Faire correspondance nombre/écriture (6)',
          'Repérer en comptant le rang (1er au 6ème)',
          'Compléter une bande numérique lacunaire',
          'Résoudre des problèmes (ajout, retrait, partage, déplacement)',
        ],
        'Langage oral': [
          'Enrichir son vocabulaire : mer, jardin/insectes et été',
          'Trouver des mots polysémiques (orange, bleu)',
          'Utiliser tous les pronoms appris',
          'Utiliser le conditionnel',
          'Subordonner avec "parce que/qui"',
          'Articuler distinctement k/g',
          'Raconter un événement non connu des autres',
        ],
        'Découvrir l\'écrit': [
          'Discriminer les sons d, g, h, k, a, x, y, w',
          'Découvrir les rimes des mots',
          'Manipuler les syllabes (permuter, répéter, fusionner)',
          'Nommer le plus de lettres connues dans plusieurs graphies',
          'Faire des hypothèses sur le contenu d\'un récit',
          'Comprendre et reformuler une histoire sans support visuel',
        ],
        'Graphisme et écriture': [
          'Tracer des ponts, coupes, vagues et ondulations',
          'Mémoriser le tracé des lettres capitales et chiffres',
          'S\'initier à l\'écriture cursive de son prénom',
        ],
        'Activité physique': [
          'Adapter ses déplacements à des contraintes variées',
          'Coopérer et s\'opposer dans des jeux de poursuite',
        ],
        'Activités artistiques': [
          'Dessiner d\'après un modèle en respectant des critères',
          'Observer et décrire des images et œuvres d\'art',
          'Apprendre à chanter en chœur',
        ],
        'Explorer le monde': [
          'Se repérer dans le mois (jour, semaine, mois, année)',
          'Coder des déplacements sur un plan ou photo',
          'Utiliser des outils numériques',
        ],
      }
    },
  };
  
  // Générer chaque période
  periodesSelectionnees.forEach((periodeId, index) => {
    const periode = programmations[periodeId];
    if (!periode) return;
    
    if (index > 0) html += `<div class="page">`;
    
    html += `
      <div class="periode-section">
        <h2 class="periode-title">${periode.titre}</h2>
    `;
    
    // Générer chaque domaine
    Object.entries(periode.domaines).forEach(([domaine, competences]) => {
      html += `
        <div class="domaine-section">
          <h3 class="domaine-title">${domaine}</h3>
      `;
      
      // Générer chaque compétence
      competences.forEach((competence, compIndex) => {
        const key = `${periodeId}_${competence.substring(0, 50)}`;
        const progression = progressions[key];
        
        html += `
          <div class="competence-block">
            <div class="competence-title">📌 ${competence}</div>
        `;
        
        // Ajouter les progressions si demandé
        if (inclureProgressions && progression && progression.semaines && progression.semaines.length > 0) {
          html += `<div class="progression-detail">`;
          html += `<p style="font-weight: 600; margin-bottom: 10px; color: #27ae60;">Progression sur ${progression.semaines.length} semaine(s) :</p>`;
          
          progression.semaines.forEach((semaine, semaineIndex) => {
            // Gérer les deux formats: string ou objet {activites: ...}
            const contenu = typeof semaine === 'string' ? semaine : (semaine.activites || '');
            
            if (contenu && contenu.trim()) {
              html += `
                <div class="semaine-item">
                  <h4>Semaine ${semaineIndex + 1}</h4>
                  <p>${contenu}</p>
                </div>
              `;
            }
          });
          
          html += `</div>`;
        } else if (inclureProgressions) {
          html += `<p style="color: #95a5a6; font-style: italic; margin-top: 10px;">Progression non renseignée</p>`;
        }
        
        html += `</div>`;
      });
      
      html += `</div>`;
    });
    
    html += `</div>`;
    
    if (index < periodesSelectionnees.length - 1) {
      html += `<div class="footer-page">Page ${index + 1}</div></div>`;
    }
  });
  
  html += `
      <div class="footer-page" style="margin-top: 40px; padding-top: 20px; border-top: 2px solid #e9ecef; text-align: center;">
        <div style="margin-bottom: 5px;">Document généré le ${new Date().toLocaleDateString('fr-FR')} - ${nomEcole}</div>
        <div style="font-weight: bold; color: #8b6f47;">© 2026 Ma Petite Bib - Tous droits réservés</div>
      </div>
    </div>
  `;
  
  console.log('📄 HTML complet généré, taille:', html.length, 'caractères');
  
  // Afficher le document
  const preview = document.getElementById('documentPreview');
  if (!preview) {
    console.error('❌ Element documentPreview non trouvé !');
    alert('Erreur : Zone d\'aperçu non trouvée');
    return;
  }
  
  preview.innerHTML = html;
  preview.style.display = 'block';
  console.log('✅ Document affiché dans preview');
  
  // Lancer l'impression après un court délai
  setTimeout(() => {
    console.log('🖨️ Lancement impression...');
    window.print();
    
    // Après l'impression, proposer de revenir
    setTimeout(() => {
      if (confirm('✅ Document généré !\n\nVoulez-vous modifier les paramètres et régénérer ?')) {
        const configPanel = document.querySelector('.config-panel');
        if (configPanel) {
          configPanel.style.display = 'block';
        }
        preview.style.display = 'none';
      }
    }, 1000);
  }, 500);
  
  console.log('✅ Fonction genererDocument terminée');
}
</script>

</body>
</html>
