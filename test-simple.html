<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test Simple</title>
<style>
body { font-family: Arial; padding: 20px; }
.domain { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; }
.domain:hover { background: #e0e0e0; }
</style>
</head>
<body>
<h1>Test Progressions GS</h1>
<div id="output"></div>

<script>
var progressionsData = {
  "Activité physique": {
    "Agir dans l'espace": {
      "toutes": ["Compétence 1", "Compétence 2"]
    }
  },
  "Langage oral": {
    "Enrichir vocabulaire": {
      "P1": ["École", "Automne"]
    }
  }
};

console.log('Données chargées:', progressionsData);

// Afficher les domaines
var container = document.getElementById('output');
var html = '<p>Domaines trouvés : ' + Object.keys(progressionsData).length + '</p>';

Object.keys(progressionsData).forEach(function(domaine) {
  html += '<div class="domain">';
  html += '<h3>' + domaine + '</h3>';
  html += '</div>';
});

container.innerHTML = html;
console.log('Affichage terminé');
</script>
</body>
</html>
